<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZebraStats — Notificações</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css?v=11" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-wrapper">

  <!-- SIDEBAR (desktop) -->
  <aside class="app-sidebar">
    <a href="home.html" class="sidebar__brand">
      <div class="sidebar__brand-icon">Z</div>
      Zebra<span>Stats</span>
    </a>
    <nav class="sidebar__nav">
      <a href="home.html"    class="sidebar__nav-item"><i data-lucide="home"></i><span>Home</span></a>
      <a href="zebras.html"  class="sidebar__nav-item"><i data-lucide="activity"></i><span>Zebras</span></a>
      <a href="ranking.html" class="sidebar__nav-item"><i data-lucide="medal"></i><span>Ranking</span></a>
      <a href="comparar.html"class="sidebar__nav-item"><i data-lucide="git-compare"></i><span>Comparar</span></a>
      <a href="alertas.html" class="sidebar__nav-item"><i data-lucide="bell-ring"></i><span>Alertas</span></a>
      <a href="liga.html"    class="sidebar__nav-item"><i data-lucide="trophy"></i><span>Ligas</span></a>
      <a href="time.html"    class="sidebar__nav-item"><i data-lucide="star"></i><span>Times</span></a>
      <a href="perfil.html"  class="sidebar__nav-item"><i data-lucide="user"></i><span>Perfil</span></a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__user-avatar">·</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">·</div>
          <div class="sidebar__user-plan">Plano Free</div>
        </div>
      </div>
      <a href="assinatura.html" class="badge badge--free" style="text-decoration:none;cursor:pointer;">FREE → PRO</a>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="app-main">

  <!-- NAVBAR -->
  <nav class="navbar">
    <button onclick="goBack('home.html')" class="navbar__icon" style="background:none;border:none;cursor:pointer;color:var(--white);display:flex;align-items:center;justify-content:center;"><i data-lucide="arrow-left" style="width:20px;height:20px;"></i></button>
    <span style="font-size:1rem;font-weight:700;flex:1;text-align:center;">Notificações</span>
    <button id="markAllBtn" style="background:none;border:none;color:var(--green);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">Marcar lidas</button>
  </nav>

  <!-- FILTROS -->
  <section style="padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card2);">
    <div class="scroll-x" style="gap:8px;">
      <button class="filter-chip active" data-nfilter="all">Todas</button>
      <button class="filter-chip" data-nfilter="zebra"><i data-lucide="zap" class="chip-ic"></i>Zebras</button>
      <button class="filter-chip" data-nfilter="jogo"><i data-lucide="circle-dot" class="chip-ic"></i>Jogos</button>
      <button class="filter-chip" data-nfilter="sistema"><i data-lucide="settings" class="chip-ic"></i>Sistema</button>
    </div>
  </section>

  <!-- LISTA DE NOTIFICAÇÕES -->
  <main style="padding-bottom:80px;" id="notifMain"></main>

  <!-- BOTTOM NAV (mobile only) -->
  <nav class="bottom-nav">
    <a href="home.html"    class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="home"></i></span>Home</a>
    <a href="zebras.html"  class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="activity"></i></span>Zebras</a>
    <a href="ranking.html" class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="medal"></i></span>Ranking</a>
    <a href="alertas.html" class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="bell-ring"></i></span>Alertas</a>
    <a href="perfil.html"  class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="user"></i></span>Perfil</a>
  </nav>

  </div><!-- /app-main -->
</div><!-- /app-wrapper -->

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/auth-guard.js?v=4"></script>
<script src="js/api.js"></script>
<script src="js/main.js?v=8"></script>
<script>
  // ── STORAGE KEYS ────────────────────────────────────────────
  const NOTIFS_READ_KEY = 'zs_notifs_read';

  // FIX 18 — dynamic relative time from ISO timestamp or ms epoch
  function relTime(ts) {
    if (!ts) return '';
    const then = typeof ts === 'number' ? ts : new Date(ts).getTime();
    const diff = Date.now() - then;
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins  <  1)  return 'Agora';
    if (mins  < 60)  return `Há ${mins} min`;
    if (hours <  2)  return 'Há 1 hora';
    if (hours < 24)  return `Há ${hours} horas`;
    if (days  === 1) return 'Ontem';
    return `Há ${days} dias`;
  }

  // ── NOTIFICAÇÕES ESTÁTICAS (sistema) ────────────────────────────
  const _now = Date.now();
  const _h = 3600000;
  const _d = 86400000;
  const NOTIFS = [
    { id:'sys-feature',  group:'Hoje',        type:'sistema', unread:false, icon:'sparkles',  iconBg:'var(--gold-dim)',        title:'Novo recurso: Tela da Liga disponível!',   desc:'Acesse tabela, artilheiros e zebras por liga diretamente no app.',   ts:_now - 8*_h,       link:'liga.html'     },
    { id:'sys-promo',    group:'Ontem',       type:'sistema', unread:false, icon:'crown',     iconBg:'var(--gold-dim)',        title:'Oferta especial: Pro Anual com -17%',      desc:'Economize R$100 comparado ao mensal. Válido por mais 3 dias.',       ts:_now - _d - 14*_h, link:'assinatura.html'},
    { id:'sys-payment',  group:'Esta semana', type:'sistema', unread:false, icon:'bell',      iconBg:'rgba(30,58,85,0.9)',     title:'Lembrete de pagamento',                    desc:'Sua assinatura Pro renova em 7 dias. Verifique seus dados.',         ts:_now - 9*_d,       link:'perfil.html'   },
  ];

  // Injeta notificações de alertas disparados (localStorage)
  function injectAlertNotifs() {
    try {
      const alerts = JSON.parse(localStorage.getItem('zs_alerts') || '[]');
      const active  = alerts.filter(a => a.active !== false);
      if (!active.length) return;
      active.forEach((a, i) => {
        const id = `alert-injected-${a.id || i}`;
        if (NOTIFS.find(x => x.id === id)) return; // skip duplicates
        const label    = a.label || a.team || a.league || 'Alerta';
        const sublabel = a.sub   || (a.team ? `Time: ${a.team}` : a.league ? `Liga: ${a.league}` : '');
        const threshold = a.threshold ? ` (ZI ≥ ${a.threshold})` : '';
        NOTIFS.unshift({
          id,
          group:   'Hoje',
          type:    'zebra', // FIX 31 — was 'alerta', not matched by any filter chip
          unread:  true,
          icon:    a.icon || 'bell-ring',
          iconBg:  a.iconBg || 'var(--green-dim)',
          title:   `🦓 ${label}${threshold}`,
          desc:    sublabel || `Alerta ativo — toque para gerenciar`,
          ts:      Date.now(), // FIX 18 — use timestamp for relTime()
          link:    'alertas.html',
        });
      });
    } catch {}
  }
  injectAlertNotifs();

  // ── ZEBRA ALERTS REAIS (API) ─────────────────────────────────
  async function loadRealZebraNotifs() {
    if (typeof ZebraAPI === 'undefined' || !ZebraAPI.isConfigured.footballData() || typeof ZebraEngine === 'undefined') return;
    try {
      const results = await Promise.allSettled([
        ZebraAPI.fetchRealZebras('ENG', 5),
        ZebraAPI.fetchRealZebras('BRA', 5),
      ]);
      const all = results
        .filter(r => r.status === 'fulfilled' && Array.isArray(r.value))
        .flatMap(r => r.value)
        .sort((a, b) => b.zi - a.zi)
        .slice(0, 6);

      if (!all.length) return;

      const now = Date.now();
      // Inject zebra alert notifications at the top (unread = true for top 3)
      all.forEach((z, i) => {
        const id = `real-zebra-${z.home}-${z.away}`.replace(/\s+/g,'-').toLowerCase();
        if (NOTIFS.find(x => x.id === id)) return;
        const cls = z.ziClass || (z.zi >= 7 ? 'grande' : z.zi >= 4 ? 'media' : 'leve');
        const clsLabel = cls === 'grande' ? '🔴 Grande' : cls === 'media' ? '🟠 Média' : '🟡 Leve';
        NOTIFS.unshift({
          id,
          group: 'Hoje',
          type: 'zebra',
          unread: i < 3,
          icon: 'zap',
          iconBg: 'var(--green-dim)',
          title: `ZEBRA ALERT — ${z.home} ${z.hs}×${z.as} ${z.away}`,
          desc: `Zebra Index ${z.zi} (${clsLabel}) · ${z.league} · ${z.date}${z.odds_h && z.odds_h !== '–' ? ` · Odd ${z.odds_h}` : ''}`,
          ts: now - i * 3600000,
          link: `partida.html?home=${encodeURIComponent(z.home)}&away=${encodeURIComponent(z.away)}&score=${z.hs}-${z.as}&zi=${z.zi}&league=${encodeURIComponent(z.league)}&date=${encodeURIComponent(z.date)}&homeCrest=${encodeURIComponent(z.homeCrest||'')}&awayCrest=${encodeURIComponent(z.awayCrest||'')}`,
        });
      });

      renderNotifs();
      lucide.createIcons();
      updateBellBadge();
    } catch(e) { console.warn('[notifs] loadRealZebraNotifs:', e); }
  }
  loadRealZebraNotifs();

  // ── ESTADO DE LEITURA (localStorage) ────────────────────────
  function getReadSet() {
    try { return new Set(JSON.parse(localStorage.getItem(NOTIFS_READ_KEY)) || []); }
    catch { return new Set(); }
  }
  function saveReadSet(set) {
    try { localStorage.setItem(NOTIFS_READ_KEY, JSON.stringify([...set])); }
    catch {}
    updateBellBadge();
  }

  let readIds = getReadSet();

  function markRead(id) {
    readIds.add(id);
    saveReadSet(readIds);
  }
  function markAllRead() {
    NOTIFS.forEach(n => readIds.add(n.id));
    saveReadSet(readIds);
  }
  function getUnreadCount() {
    return NOTIFS.filter(n => n.unread && !readIds.has(n.id)).length;
  }

  // ── RENDER ───────────────────────────────────────────────────
  let activeFilter = 'all';

  function renderNotifs() {
    const main = document.getElementById('notifMain');
    main.innerHTML = '';

    // Update "Marcar lidas" label with count
    const unread = getUnreadCount();
    const markBtn = document.getElementById('markAllBtn');
    markBtn.textContent = unread > 0 ? `Marcar lidas (${unread})` : 'Tudo lido';
    markBtn.style.opacity = unread > 0 ? '1' : '0.4';
    markBtn.style.pointerEvents = unread > 0 ? 'auto' : 'none';

    const filtered = activeFilter === 'all' ? NOTIFS : NOTIFS.filter(n => n.type === activeFilter);
    if (!filtered.length) {
      if (activeFilter === 'zebra' || activeFilter === 'jogo') {
        main.innerHTML = `
          <div style="text-align:center;padding:48px 16px;color:var(--text-muted,var(--gray));">
            <i data-lucide="bell-off" style="width:40px;height:40px;margin-bottom:12px;opacity:0.35;display:block;margin-left:auto;margin-right:auto;"></i>
            <p style="margin:0 0 6px;font-weight:600;font-size:0.95rem;">Nenhuma notificação aqui</p>
            <p style="margin:0;font-size:0.8rem;opacity:0.7;">Ative alertas para receber notificações desta categoria</p>
          </div>`;
      } else {
        main.innerHTML = `<div style="text-align:center;padding:48px 16px;color:var(--gray);">
          <div style="width:48px;height:48px;border-radius:14px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
            <i data-lucide="bell-off" style="width:22px;height:22px;opacity:0.5;"></i>
          </div>
          <div style="font-weight:600;margin-bottom:4px;">Nenhuma notificação</div>
          <div style="font-size:0.8125rem;">Você está em dia!</div>
        </div>`;
      }
      lucide.createIcons();
      return;
    }

    const groups = {};
    filtered.forEach(n => {
      if (!groups[n.group]) groups[n.group] = [];
      groups[n.group].push(n);
    });

    Object.entries(groups).forEach(([group, items]) => {
      const groupUnread = items.filter(n => n.unread && !readIds.has(n.id)).length;

      const header = document.createElement('div');
      header.innerHTML = `<div style="padding:8px 16px 4px;display:flex;align-items:center;gap:6px;">
        <span style="font-size:0.6875rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;">${group}</span>
        ${groupUnread > 0 ? `<span style="background:var(--green);color:#000;font-size:0.5625rem;font-weight:700;padding:1px 6px;border-radius:var(--radius-pill);">${groupUnread}</span>` : ''}
      </div>`;
      main.appendChild(header);

      const groupWrap = document.createElement('div');
      groupWrap.style.cssText = 'background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);';

      items.forEach((n, idx) => {
        const isUnread = n.unread && !readIds.has(n.id);
        const item = document.createElement('div');
        item.className = `notif-item${isUnread ? ' notif-item--unread' : ''}`;
        if (idx < items.length - 1) item.style.borderBottom = '1px solid var(--border)';

        item.innerHTML = `
          <div class="notif-item__icon" style="background:${n.iconBg};display:flex;align-items:center;justify-content:center;">
            <i data-lucide="${n.icon}" style="width:16px;height:16px;"></i>
          </div>
          <div class="notif-item__body">
            <div class="notif-item__title">${n.title}</div>
            <div class="notif-item__desc">${n.desc}</div>
            <div class="notif-item__time">${n.ts ? relTime(n.ts) : (n.time || '')}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
            ${isUnread ? '<div class="notif-item__dot"></div>' : '<div style="width:8px;"></div>'}
            <button class="notif-read-btn" data-id="${n.id}" title="${isUnread ? 'Marcar como lida' : 'Lida'}" style="background:none;border:none;cursor:pointer;color:${isUnread ? 'var(--green)' : 'var(--border)'};padding:0;display:flex;">
              <i data-lucide="${isUnread ? 'circle' : 'check-circle'}" style="width:13px;height:13px;"></i>
            </button>
          </div>
        `;

        // Click item → mark read + navigate
        item.addEventListener('click', e => {
          if (e.target.closest('.notif-read-btn')) return;
          markRead(n.id);
          renderNotifs();
          lucide.createIcons();
          setTimeout(() => window.location.href = n.link, 150);
        });

        // Click read button only → mark read in place
        item.querySelector('.notif-read-btn').addEventListener('click', e => {
          e.stopPropagation();
          if (isUnread) { markRead(n.id); renderNotifs(); lucide.createIcons(); }
        });

        groupWrap.appendChild(item);
      });

      main.appendChild(groupWrap);
    });

    lucide.createIcons();
  }

  // ── FILTROS ──────────────────────────────────────────────────
  document.querySelectorAll('[data-nfilter]').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-nfilter]').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeFilter = this.dataset.nfilter;
      renderNotifs();
    });
  });

  // ── MARCAR TODAS COMO LIDAS ───────────────────────────────────
  document.getElementById('markAllBtn').addEventListener('click', () => {
    if (getUnreadCount() === 0) return;
    markAllRead();
    renderNotifs();
    lucide.createIcons();
    showToast('✓ Todas marcadas como lidas');
  });

  // ── INIT ─────────────────────────────────────────────────────
  renderNotifs();
  initBellBadge();
  lucide.createIcons();

  // Shake bell if unreads
  if (getUnreadCount() > 0) {
    setTimeout(() => {
      const navBell = document.querySelector('.navbar [data-lucide="bell"], .navbar [data-lucide="bell-ring"]');
      if (navBell) navBell.closest('button, a')?.classList.add('bell-shake');
    }, 600);
  }

  // Garante renderização mesmo que DOMContentLoaded já tenha disparado
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof renderNotifs === 'function') renderNotifs();
  });
</script>
<style>
  .bottom-nav__icon i { width: 20px; height: 20px; display: block; }
  .chip-ic { width: 12px; height: 12px; display: block; flex-shrink: 0; }
  .filter-chip { display: inline-flex; align-items: center; gap: 5px; }
  .navbar__icon i { display: block; }

  /* ── NOTIFICATION SLIDE-IN ────────────────────────────────── */
  @keyframes notifSlideIn {
    from { opacity:0; transform:translateX(16px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .notif-item {
    animation: notifSlideIn 0.3s ease both;
  }

  /* ── UNREAD DOT PULSE ─────────────────────────────────────── */
  @keyframes dotPulse {
    0%,100% { transform:scale(1);   opacity:1; }
    50%     { transform:scale(1.4); opacity:0.7; }
  }
  .notif-unread-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--green);
    animation: dotPulse 1.5s ease infinite;
    flex-shrink:0;
  }

  /* ── BELL SHAKE ───────────────────────────────────────────── */
  @keyframes bellShake {
    0%,100% { transform: rotate(0); }
    15%     { transform: rotate(12deg); }
    30%     { transform: rotate(-10deg); }
    45%     { transform: rotate(8deg); }
    60%     { transform: rotate(-5deg); }
    75%     { transform: rotate(3deg); }
  }
  .bell-shake { animation: bellShake 0.7s ease; }
</style>
</body>
</html>
