<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZebraStats — Busca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css?v=12" />
  <script src="https://unpkg.com/lucide@0.363.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-wrapper">

  <!-- SIDEBAR (desktop) -->
  <aside class="app-sidebar">
    <a href="home.html" class="sidebar__brand">
      <div class="sidebar__brand-icon">Z</div>
      Zebra<span>Stats</span>
    </a>
    <nav class="sidebar__nav">
      <a href="home.html"    class="sidebar__nav-item"><i data-lucide="home"></i><span>Home</span></a>
      <a href="zebras.html"  class="sidebar__nav-item"><i data-lucide="activity"></i><span>Zebras</span></a>
      <a href="ranking.html" class="sidebar__nav-item"><i data-lucide="medal"></i><span>Ranking</span></a>
      <a href="comparar.html"class="sidebar__nav-item"><i data-lucide="git-compare"></i><span>Comparar</span></a>
      <a href="alertas.html" class="sidebar__nav-item"><i data-lucide="bell-ring"></i><span>Alertas</span></a>
      <a href="liga.html"    class="sidebar__nav-item"><i data-lucide="trophy"></i><span>Ligas</span></a>
      <a href="time.html"    class="sidebar__nav-item"><i data-lucide="star"></i><span>Times</span></a>
      <a href="perfil.html"  class="sidebar__nav-item"><i data-lucide="user"></i><span>Perfil</span></a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__user-avatar" style="opacity:0.3;"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">·</div>
          <div class="sidebar__user-plan">Plano Free</div>
        </div>
      </div>
      <a href="assinatura.html" class="badge badge--free" style="text-decoration:none;cursor:pointer;">FREE → PRO</a>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="app-main">

  <!-- NAVBAR com input de busca -->
  <nav class="navbar" style="gap:8px;">
    <button onclick="goBack('home.html')" class="navbar__icon" style="background:none;border:none;cursor:pointer;color:var(--white);flex-shrink:0;">
      <i data-lucide="arrow-left" style="width:20px;height:20px;"></i>
    </button>
    <div class="search-bar" style="flex:1;padding:8px 12px;position:relative;">
      <span class="search-bar__icon"><i data-lucide="search" style="width:16px;height:16px;color:var(--gray);"></i></span>
      <input type="text" id="searchInput" placeholder="Times, ligas, partidas..." autofocus autocomplete="off" />
      <!-- Spinner de carregamento -->
      <div id="searchSpinner" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:0.875rem;color:var(--gray);">
        <i data-lucide="loader" style="width:16px;height:16px;animation:spin 0.8s linear infinite;"></i>
      </div>
      <button id="clearBtn" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;line-height:1;padding:4px;">
        <i data-lucide="x" style="width:16px;height:16px;"></i>
      </button>
    </div>
  </nav>

  <!-- FILTROS DE CATEGORIA -->
  <section style="padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card2);">
    <div class="scroll-x" style="gap:8px;">
      <button class="filter-chip active" data-cat="all">Tudo</button>
      <button class="filter-chip" data-cat="times"><i data-lucide="star" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;"></i>Times</button>
      <button class="filter-chip" data-cat="ligas"><i data-lucide="trophy" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;"></i>Ligas</button>
      <button class="filter-chip" data-cat="matches" data-filter="matches" onclick="setFilter('matches')"><i data-lucide="calendar" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;"></i>Partidas</button>
    </div>
  </section>

  <!-- CONTEÚDO PRINCIPAL -->
  <main style="padding-bottom:80px;" id="mainContent">

    <!-- ── ESTADO INICIAL (sem query) ────────────────────────── -->
    <div id="stateInitial">

      <!-- BUSCAS RECENTES -->
      <div id="recentSection" style="padding:16px 16px 0;display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="font-size:0.875rem;font-weight:600;display:flex;align-items:center;gap:6px;">
            <i data-lucide="clock" style="width:15px;height:15px;color:var(--gray);"></i> Recentes
          </span>
          <button id="clearHistoryBtn" style="background:none;border:none;color:var(--green);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;">Limpar</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;" id="recentChips"></div>
      </div>

      <!-- EM ALTA -->
      <div style="padding:16px 16px 0;">
        <div style="font-size:0.875rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
          <i data-lucide="trending-up" style="width:15px;height:15px;color:var(--green);"></i> Em Alta
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;" id="trendingList"></div>
      </div>

      <!-- SUGESTÕES POPULARES: TIMES -->
      <div style="padding:16px 16px 0;">
        <div style="font-size:0.875rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
          <i data-lucide="star" style="width:15px;height:15px;color:var(--gold);"></i> Times Populares
        </div>
        <div class="popular-teams-wrap">
          <div class="scroll-x" style="gap:10px;padding-bottom:4px;" id="popularTeams"></div>
        </div>
      </div>

      <!-- SUGESTÕES POPULARES: LIGAS -->
      <div style="padding:16px;">
        <div style="font-size:0.875rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
          <i data-lucide="trophy" style="width:15px;height:15px;color:var(--gold);"></i> Ligas Populares
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;" id="popularLeagues"></div>
      </div>

    </div>

    <!-- ── ESTADO DE LOADING ───────────────────────────────────── -->
    <div id="stateLoading" style="display:none;padding:8px 0;">
      <div style="padding:8px 16px 4px;">
        <div class="skel" style="height:12px;width:160px;border-radius:6px;"></div>
      </div>
      <!-- Skeletons de resultado -->
      <div id="skeletonList"></div>
    </div>

    <!-- ── ESTADO DE RESULTADOS ───────────────────────────────── -->
    <div id="stateResults" style="display:none;">
      <div style="padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:0.8125rem;color:var(--gray);" id="resultsCount"></span>
      </div>
      <div id="resultsList"></div>
    </div>

    <!-- ── ESTADO VAZIO ───────────────────────────────────────── -->
    <div id="stateEmpty" style="display:none;padding:56px 24px;text-align:center;">
      <div style="width:72px;height:72px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;animation:searchBounce 1.2s ease infinite;">
        <i data-lucide="search" style="width:30px;height:30px;color:var(--gray);"></i>
      </div>
      <div style="font-size:1rem;font-weight:700;margin-bottom:6px;" id="emptyTitle">Nenhum resultado</div>
      <div style="font-size:0.8125rem;color:var(--gray);margin-bottom:20px;" id="emptyMsg"></div>
      <div style="font-size:0.75rem;color:var(--gray);margin-bottom:10px;">Tente buscar por:</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;" id="emptySuggestions"></div>
    </div>

  </main>

  <!-- BOTTOM NAV (mobile only) -->
  <nav class="bottom-nav">
    <a href="home.html"    class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="home"></i></span>Home</a>
    <a href="zebras.html"  class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="activity"></i></span>Zebras</a>
    <a href="ranking.html" class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="medal"></i></span>Ranking</a>
    <a href="alertas.html" class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="bell-ring"></i></span>Alertas</a>
    <a href="perfil.html"  class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="user"></i></span>Perfil</a>
  </nav>

  </div><!-- /app-main -->
</div><!-- /app-wrapper -->

<div class="toast" id="toast"></div>

<!-- ── STYLES ─────────────────────────────────────────────────── -->
<style>
  .bottom-nav__icon i { width:20px;height:20px;display:block; }
  .navbar__icon i, .search-bar__icon i { display:block; }

  @keyframes spin  { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── POPULAR TEAMS SCROLL FADE ───────────────────────────── */
  .popular-teams-wrap {
    position: relative;
  }
  .popular-teams-wrap::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 48px;
    background: linear-gradient(to right, transparent, var(--bg-base, #0f0f13));
    pointer-events: none;
  }

  @media (max-width: 400px) {
    .teams-grid, .cards-grid, .cards-grid-2 { grid-template-columns: 1fr !important; }
  }

  /* ── RESULT SECTION ───────────────────────────────────────── */
  .results-section { margin-bottom: 4px; }
  .results-section__header {
    padding: 10px 16px 6px;
    font-size: 0.6875rem;
    font-weight: 700;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .results-section__list {
    background: var(--card);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* ── RESULT ITEM ──────────────────────────────────────────── */
  .result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    cursor: pointer;
    transition: background var(--transition);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover, .result-item:active { background: var(--card2); }

  .result-item__crest {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--card2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
    font-size: 1.375rem; /* para emoji de bandeiras */
  }
  .result-item__crest img {
    width: 34px; height: 34px; object-fit: contain;
  }
  .result-item__crest--league {
    border-radius: var(--radius-sm);
  }

  .result-item__body  { flex: 1; min-width: 0; }
  .result-item__label { font-size: 0.9375rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-item__sub   { font-size: 0.75rem; color: var(--gray); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .result-item__badge {
    font-size: 0.5625rem; font-weight: 700;
    padding: 2px 7px; border-radius: var(--radius-pill);
    flex-shrink: 0; white-space: nowrap;
  }
  .badge--type-time  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(46,230,92,0.3); }
  .badge--type-liga  { background: var(--gold-dim);  color: var(--gold);  border: 1px solid rgba(255,200,50,0.3); }

  /* ── FAV BUTTON ───────────────────────────────────────────── */
  .fav-star-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: none;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    color: var(--gray);
  }
  .fav-star-btn:hover         { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .fav-star-btn.is-fav        { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .fav-star-btn.is-fav:hover  { border-color: var(--red);  color: var(--red);  background: var(--red-dim); }
  .fav-star-btn i { display: block; }

  /* ── SKELETON ─────────────────────────────────────────────── */
  .result-skel {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .result-skel:last-child { border-bottom: none; }

  /* ── POPULAR TEAM PILL ────────────────────────────────────── */
  .pop-team-pill {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; flex-shrink: 0;
  }
  .pop-team-pill__crest {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-size: 0.5625rem; font-weight: 700; color: var(--gray);
    transition: border-color 0.2s;
  }
  .pop-team-pill:hover .pop-team-pill__crest { border-color: var(--green); }
  .pop-team-pill__crest img { width: 40px; height: 40px; object-fit: contain; }
  .pop-team-pill__name {
    font-size: 0.6875rem; font-weight: 500;
    max-width: 64px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--gray);
  }

  /* ── POPULAR LEAGUE CARD ──────────────────────────────────── */
  .pop-league-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: center;
  }
  .pop-league-card:hover { border-color: var(--green); background: var(--green-dim); }
  .pop-league-card__flag {
    font-size: 1.5rem; line-height: 1;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .pop-league-card__flag img { width: 32px; height: 32px; object-fit: contain; }
  .pop-league-card__name { font-size: 0.6875rem; font-weight: 600; color: var(--gray); line-height: 1.3; }

  /* ── RESULT SLIDE-UP ANIMATION ───────────────────────────── */
  @keyframes resultSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-item { animation: resultSlideUp 0.25s ease both; }
  .result-item:nth-child(1){animation-delay:0.03s}
  .result-item:nth-child(2){animation-delay:0.06s}
  .result-item:nth-child(3){animation-delay:0.09s}
  .result-item:nth-child(4){animation-delay:0.12s}
  .result-item:nth-child(5){animation-delay:0.15s}

  /* ── EMPTY STATE BOUNCE ───────────────────────────────────── */
  @keyframes searchBounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  /* ── POPULAR TEAM CHIP ────────────────────────────────────── */
  .pop-team-chip {
    display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;
    min-width:64px;flex-shrink:0;
  }
  .pop-team-chip__avatar {
    width:52px;height:52px;border-radius:50%;
    background:linear-gradient(135deg,var(--card),var(--card2));
    border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:1.25rem;font-weight:700;
    transition:border-color 0.2s,transform 0.2s;
  }
  .pop-team-chip:hover .pop-team-chip__avatar {
    border-color:var(--green);transform:scale(1.08);
  }
  .pop-team-chip__label { font-size:0.6875rem;color:var(--gray);text-align:center;max-width:64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

  /* ── RECENT CHIP ──────────────────────────────────────────── */
  .recent-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-pill); padding: 5px 10px 5px 12px;
    font-size: 0.8125rem; color: var(--white);
    cursor: pointer; transition: border-color 0.2s;
    white-space: nowrap;
  }
  .recent-chip:hover { border-color: var(--green); }
  .recent-chip__del {
    background: none; border: none; color: var(--gray);
    cursor: pointer; padding: 0; display: flex; align-items: center;
    transition: color 0.15s;
  }
  .recent-chip__del:hover { color: var(--red); }
</style>

<!-- ── SCRIPTS ─────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="js/api.js"></script>
<script src="js/main.js?v=9"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  BUSCA.JS — lógica principal
// ═══════════════════════════════════════════════════════════════

// ── CONSTANTES ────────────────────────────────────────────────
const HISTORY_KEY  = 'zs_search_history';
const MAX_HISTORY  = 8;

const POPULAR_TEAMS = [
  { id:'pop-flamengo',    name:'Flamengo',       abbr:'FLA' },
  { id:'pop-palmeiras',   name:'Palmeiras',       abbr:'PAL' },
  { id:'pop-corinthians', name:'Corinthians',     abbr:'COR' },
  { id:'pop-botafogo',    name:'Botafogo',        abbr:'BOT' },
  { id:'pop-real',        name:'Real Madrid',     abbr:'RMA' },
  { id:'pop-barca',       name:'Barcelona',       abbr:'BAR' },
  { id:'pop-mancity',     name:'Man. City',       abbr:'MCI' },
  { id:'pop-liverpool',   name:'Liverpool',       abbr:'LIV' },
  { id:'pop-arsenal',     name:'Arsenal',         abbr:'ARS' },
  { id:'pop-juventus',    name:'Juventus',        abbr:'JUV' },
  { id:'pop-bayern',      name:'Bayern Munich',   abbr:'BAY' },
  { id:'pop-psg',         name:'PSG',             abbr:'PSG' },
];

const POPULAR_LEAGUES = [
  { id:'BRA', name:'Brasileirão',    flag:'🇧🇷' },
  { id:'ENG', name:'Premier League', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
  { id:'ESP', name:'La Liga',        flag:'🇪🇸' },
  { id:'ITA', name:'Serie A',        flag:'🇮🇹' },
  { id:'GER', name:'Bundesliga',     flag:'🇩🇪' },
  { id:'FRA', name:'Ligue 1',        flag:'🇫🇷' },
  { id:'POR', name:'Liga Portugal',  flag:'🇵🇹' },
  { id:'ARG', name:'Liga Argentina', flag:'🇦🇷' },
  { id:'UCL', name:'Champions',      flag:'🌍' },
];

const LOCAL_LEAGUES = [
  { id:'BRA', name:'Brasileirão Série A',  country:'Brasil',    flag:'🇧🇷' },
  { id:'ENG', name:'Premier League',       country:'Inglaterra',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
  { id:'ESP', name:'La Liga',              country:'Espanha',   flag:'🇪🇸' },
  { id:'ITA', name:'Serie A',              country:'Itália',    flag:'🇮🇹' },
  { id:'GER', name:'Bundesliga',           country:'Alemanha',  flag:'🇩🇪' },
  { id:'FRA', name:'Ligue 1',              country:'França',    flag:'🇫🇷' },
  { id:'UCL', name:'Champions League',     country:'Europa',    flag:'🌍' },
  { id:'UEL', name:'Europa League',        country:'Europa',    flag:'🟠' },
  { id:'POR', name:'Primeira Liga',        country:'Portugal',  flag:'🇵🇹' },
  { id:'ARG', name:'Liga Profesional',     country:'Argentina', flag:'🇦🇷' },
  { id:'MEX', name:'Liga MX',              country:'México',    flag:'🇲🇽' },
  { id:'NED', name:'Eredivisie',           country:'Holanda',   flag:'🇳🇱' },
  { id:'USA', name:'MLS',                  country:'EUA',       flag:'🇺🇸' },
];

const TRENDING = [
  { icon:'🦓', label:'Botafogo 3×0 Flamengo',     sub:'ZI 8.2 — Maior zebra da rodada',  link:'partida.html', query:'' },
  { icon:'🏆', label:'Brasileirão — Rodada 12',   sub:'Tabela atualizada · 8 jogos',      link:'liga.html',    query:'' },
  { icon:'📊', label:'Maiores zebras da semana',  sub:'Top 5 resultados improváveis',     link:'zebras.html',  query:'' },
  { icon:'⭐', label:'Flamengo',                  sub:'5 jogos sem derrota em casa',      link:'time.html',    query:'Flamengo' },
  { icon:'🌟', label:'Erling Haaland',            sub:'Man. City · 28 gols na temporada', link:'time.html',    query:'Manchester City' },
];

const EMPTY_SUGGESTIONS = ['Flamengo','Premier League','Haaland','Barcelona','Brasileirão','Juventus','Arsenal'];

// ── STATE ─────────────────────────────────────────────────────
let activeCategory = 'all';
let currentQuery   = '';
let debounceTimer  = null;
let apiAbortCtrl   = null;  // controle para cancelar requests anteriores

// ═══════════════════════════════════════════════════════════════
//  HISTÓRICO DE BUSCAS (localStorage)
// ═══════════════════════════════════════════════════════════════

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}

function addToHistory(term) {
  if (!term || term.length < 2) return;
  let hist = getHistory().filter(h => h.toLowerCase() !== term.toLowerCase());
  hist.unshift(term);
  hist = hist.slice(0, MAX_HISTORY);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); } catch {}
}

function removeFromHistory(term) {
  const hist = getHistory().filter(h => h.toLowerCase() !== term.toLowerCase());
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); } catch {}
  renderHistory();
}

function clearHistory() {
  try { localStorage.removeItem(HISTORY_KEY); } catch {}
  renderHistory();
  showToast('🗑️ Histórico limpo');
}

function renderHistory() {
  const hist    = getHistory();
  const section = document.getElementById('recentSection');
  const chips   = document.getElementById('recentChips');

  if (!hist.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  chips.innerHTML = '';

  hist.forEach(term => {
    const chip = document.createElement('div');
    chip.className = 'recent-chip';
    chip.innerHTML = `
      <i data-lucide="clock" style="width:13px;height:13px;color:var(--gray);flex-shrink:0;"></i>
      <span>${term}</span>
      <button class="recent-chip__del" title="Remover" onclick="event.stopPropagation();removeFromHistory('${term.replace(/'/g,"\\'")}');">
        <i data-lucide="x" style="width:12px;height:12px;"></i>
      </button>`;
    chip.addEventListener('click', e => {
      if (e.target.closest('.recent-chip__del')) return;
      document.getElementById('searchInput').value = term;
      triggerSearch(term);
    });
    chips.appendChild(chip);
  });
  lucide.createIcons();
}

// ═══════════════════════════════════════════════════════════════
//  ESTADO INICIAL — POPULARES E TRENDING
// ═══════════════════════════════════════════════════════════════

function renderTrending() {
  const container = document.getElementById('trendingList');
  TRENDING.forEach((t, i) => {
    const row = document.createElement('div');
    const isLast = i === TRENDING.length - 1;
    row.style.cssText = `display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;transition:background var(--transition);${isLast ? '' : 'border-bottom:1px solid var(--border);'}`;
    row.innerHTML = `
      <span style="font-size:1.25rem;width:28px;text-align:center;flex-shrink:0;">${t.icon}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:0.9375rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.label}</div>
        <div style="font-size:0.75rem;color:var(--gray);margin-top:1px;">${t.sub}</div>
      </div>
      <i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--border);flex-shrink:0;"></i>`;
    row.addEventListener('mouseenter', () => row.style.background = 'var(--card2)');
    row.addEventListener('mouseleave', () => row.style.background = '');
    row.addEventListener('click', () => {
      if (t.query) {
        document.getElementById('searchInput').value = t.query;
        triggerSearch(t.query);
      } else {
        window.location.href = t.link;
      }
    });
    container.appendChild(row);
  });
}

function renderPopularTeams() {
  const container = document.getElementById('popularTeams');
  POPULAR_TEAMS.forEach(t => {
    const pill = document.createElement('div');
    pill.className = 'pop-team-pill';
    pill.innerHTML = `
      <div class="pop-team-pill__crest" id="ptc-${t.id}">
        <span>${t.abbr}</span>
      </div>
      <div class="pop-team-pill__name">${t.name.split(' ')[0]}</div>`;
    pill.addEventListener('click', () => {
      document.getElementById('searchInput').value = t.name;
      triggerSearch(t.name);
    });
    container.appendChild(pill);
    // Carrega logo de forma assíncrona
    loadPopularTeamCrest(t.id, t.name);
  });
}

async function loadPopularTeamCrest(id, name) {
  if (!window.ZebraAPI) return;
  try {
    const data = await ZebraAPI.sportsDb.searchTeam(name);
    const logo = data?.teams?.[0]?.strTeamBadge || '';
    if (logo) {
      const el = document.getElementById(`ptc-${id}`);
      if (el) el.innerHTML = `<img src="${logo}" alt="${name}" onerror="this.style.display='none'">`;
    }
  } catch {}
}

function renderPopularLeagues() {
  const container = document.getElementById('popularLeagues');
  POPULAR_LEAGUES.forEach(l => {
    const card = document.createElement('div');
    card.className = 'pop-league-card';
    // Usa flagcdn como fallback imediato (sem emoji regional)
    const fallback = flagImg(l.id, 24) || `<span style="font-size:1.25rem;">${l.flag}</span>`;
    card.innerHTML = `
      <div class="pop-league-card__flag" id="plf-${l.id}">${fallback}</div>
      <div class="pop-league-card__name">${l.name}</div>`;
    card.addEventListener('click', () => {
      localStorage.setItem('zs_search_league', l.id);
      window.location.href = 'liga.html?id=' + l.id;
    });
    container.appendChild(card);
    // Logo oficial SDB substitui a bandeira
    loadPopularLeagueLogo(l.id);
  });
}

async function loadPopularLeagueLogo(lid) {
  const logo = await loadLeagueLogo(lid);  // global main.js
  if (!logo) return;
  const el = document.getElementById(`plf-${lid}`);
  if (el) el.innerHTML = `<img src="${logo}" onerror="this.style.display='none'">`;
}

// ═══════════════════════════════════════════════════════════════
//  BUSCA PRINCIPAL
// ═══════════════════════════════════════════════════════════════

function triggerSearch(val) {
  currentQuery = val.trim();
  document.getElementById('clearBtn').style.display      = currentQuery ? 'flex' : 'none';
  document.getElementById('searchSpinner').style.display = 'none';

  if (!currentQuery) {
    showState('initial');
    return;
  }

  // Mostra skeletons imediatamente
  showState('loading');
  renderSkeletons(4);

  // Debounce 300ms para a busca real
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => runSearch(currentQuery), 300);
}

async function runSearch(query) {
  if (query !== currentQuery) return; // query mudou, ignora

  // Abort any previous in-flight request
  if (apiAbortCtrl) apiAbortCtrl.abort();
  apiAbortCtrl = new AbortController();

  document.getElementById('searchSpinner').style.display = 'flex';

  const teamResults  = [];
  const leagueResults = [];

  // ── 1. Busca de ligas (local — instantânea) ────────────────
  const q = query.toLowerCase();
  LOCAL_LEAGUES.forEach(l => {
    if (l.name.toLowerCase().includes(q) || l.country.toLowerCase().includes(q) || l.id.toLowerCase().includes(q)) {
      if (activeCategory === 'all' || activeCategory === 'ligas' || activeCategory === 'matches') {
        leagueResults.push(l);
      }
    }
  });

  // ── 1b. Filtro "Partidas" — em breve (Fix [38]) ───────────────
  if (activeCategory === 'matches') {
    document.getElementById('searchSpinner').style.display = 'none';
    const container = document.getElementById('resultsList');
    document.getElementById('resultsCount').textContent = 'Busca por partidas';
    container.innerHTML = `
      <div style="text-align:center;padding:48px 24px;color:var(--gray);">
        <div style="font-size:2rem;margin-bottom:12px;">⚽</div>
        <div style="font-size:0.9375rem;font-weight:600;margin-bottom:6px;">Busca por Partidas</div>
        <div style="font-size:0.8125rem;color:var(--gray);line-height:1.5;">
          Esta funcionalidade estará disponível em breve.<br>
          Use os filtros <strong style="color:var(--white);">Times</strong> ou <strong style="color:var(--white);">Ligas</strong> para encontrar o que procura.
        </div>
      </div>`;
    showState('results');
    addToHistory(query);
    return;
  }

  // ── 2. Busca de times via SDB API ──────────────────────────
  if ((activeCategory === 'all' || activeCategory === 'times') && window.ZebraAPI) {
    try {
      const data = await ZebraAPI.sportsDb.searchTeam(query);
      if (query !== currentQuery) return; // query mudou durante o await

      (data?.teams || []).slice(0, 10).forEach(t => {
        teamResults.push({
          id:      `sdb-${t.idTeam}`,
          name:    t.strTeam    || '—',
          league:  t.strLeague  || '',
          country: t.strCountry || '',
          crest:   t.strTeamBadge || t.strBadge || '',
        });
      });
    } catch(e) {
      if (query !== currentQuery) return;
      console.warn('[busca] API error:', e.message);
    }
  }

  document.getElementById('searchSpinner').style.display = 'none';

  // Discard stale results if a newer search was already started
  if (apiAbortCtrl?.signal?.aborted) return;

  if (!teamResults.length && !leagueResults.length) {
    showState('empty', query);
    return;
  }

  renderResults(teamResults, leagueResults, query);
  showState('results');

  // Adiciona ao histórico
  addToHistory(query);
}

// ── RENDERIZAR RESULTADOS ─────────────────────────────────────
function renderResults(teams, leagues, query) {
  const container = document.getElementById('resultsList');
  container.innerHTML = '';
  let total = teams.length + leagues.length;
  document.getElementById('resultsCount').textContent =
    `${total} resultado${total !== 1 ? 's' : ''} para "${query}"`;

  // Seção Times
  if (teams.length) {
    const section = buildSection(
      '<i data-lucide="star" style="width:13px;height:13px;"></i> Times',
      teams.map(t => buildTeamItem(t, query))
    );
    container.appendChild(section);
  }

  // Seção Ligas
  if (leagues.length) {
    const section = buildSection(
      '<i data-lucide="trophy" style="width:13px;height:13px;"></i> Ligas',
      leagues.map(l => buildLeagueItem(l, query))
    );
    container.appendChild(section);
  }

  lucide.createIcons();
}

function buildSection(headerHtml, items) {
  const wrap = document.createElement('div');
  wrap.className = 'results-section';

  const header = document.createElement('div');
  header.className = 'results-section__header';
  header.innerHTML = headerHtml;
  wrap.appendChild(header);

  const list = document.createElement('div');
  list.className = 'results-section__list';
  items.forEach(el => list.appendChild(el));
  wrap.appendChild(list);
  return wrap;
}

function buildTeamItem(t, query) {
  const row = document.createElement('div');
  row.className = 'result-item';

  const isFav  = isFavorite(t.id);
  const subParts = [t.league, t.country].filter(Boolean);

  row.innerHTML = `
    <div class="result-item__crest" id="rc-${t.id}">
      ${t.crest
        ? `<img src="${t.crest}" alt="${t.name}" onerror="this.style.display='none'">`
        : `<span style="font-size:0.5rem;font-weight:700;color:var(--gray);">${t.name.substring(0,3).toUpperCase()}</span>`}
    </div>
    <div class="result-item__body">
      <div class="result-item__label">${highlight(t.name, query)}</div>
      <div class="result-item__sub">${subParts.join(' · ') || 'Time de futebol'}</div>
    </div>
    <span class="result-item__badge badge--type-time">Time</span>
    <button class="fav-star-btn ${isFav ? 'is-fav' : ''}" data-type="time" data-id="${t.id}" data-name="${t.name.replace(/"/g,'&quot;')}" data-crest="${t.crest}" title="${isFav ? 'Remover dos favoritos' : 'Favoritar'}">
      <i data-lucide="star" style="width:15px;height:15px;${isFav ? 'fill:var(--gold);color:var(--gold);' : ''}"></i><!-- FIX 33 -->
    </button>`;

  // Click no item → navega
  row.addEventListener('click', e => {
    if (e.target.closest('.fav-star-btn')) return;
    addToHistory(t.name);
    localStorage.setItem('zs_search_team', t.name);
    const teamSlug = typeof normalizeTeamSlug === 'function' ? normalizeTeamSlug(t.id) : t.id;
    window.location.href = 'time.html?team=' + encodeURIComponent(teamSlug);
  });

  // Click no botão de favorito
  row.querySelector('.fav-star-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    const nowFav = toggleFavorite(t.id, t.name, { crest: t.crest });
    this.classList.toggle('is-fav', nowFav);
    const icon = this.querySelector('i');
    icon.style.fill = nowFav ? 'var(--gold)' : '';
    animFavBtn(this);
  });

  return row;
}

function buildLeagueItem(l, query) {
  const row = document.createElement('div');
  row.className = 'result-item';
  const isFav = isFavLeague(l.id);

  row.innerHTML = `
    <div class="result-item__crest result-item__crest--league" style="border-radius:var(--radius-sm);" id="rl-${l.id}">
      ${flagImg(l.id, 28) || `<span style="font-size:1.25rem;">${l.flag}</span>`}
    </div>
    <div class="result-item__body">
      <div class="result-item__label">${highlight(l.name, query)}</div>
      <div class="result-item__sub">${l.country}</div>
    </div>
    <span class="result-item__badge badge--type-liga">Liga</span>
    <button class="fav-star-btn ${isFav ? 'is-fav' : ''}" data-type="liga" data-id="${l.id}" title="${isFav ? 'Remover dos favoritos' : 'Favoritar'}">
      <i data-lucide="star" style="width:15px;height:15px;${isFav ? 'fill:var(--gold);' : ''}"></i>
    </button>`;

  // Click no item → navega
  row.addEventListener('click', e => {
    if (e.target.closest('.fav-star-btn')) return;
    addToHistory(l.name);
    localStorage.setItem('zs_search_league', l.id);
    window.location.href = 'liga.html?id=' + l.id;
  });

  // Click no botão de favorito
  row.querySelector('.fav-star-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    const nowFav = toggleFavLeague(l.id, l.name);
    this.classList.toggle('is-fav', nowFav);
    const icon = this.querySelector('i');
    icon.style.fill = nowFav ? 'var(--gold)' : '';
    animFavBtn(this);
  });

  // Tenta carregar logo da liga via cache
  loadLeagueLogo(l.id).then(badge => {
    if (badge) {
      const el = document.getElementById(`rl-${l.id}`);
      if (el) el.innerHTML = `<img src="${badge}" alt="${l.name}" style="width:34px;height:34px;object-fit:contain;" onerror="this.parentElement.textContent='${l.flag}'">`;
    }
  }).catch(() => {});

  return row;
}

// ── SKELETONS ─────────────────────────────────────────────────
function renderSkeletons(n) {
  const container = document.getElementById('skeletonList');
  container.innerHTML = `
    <div style="background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
      ${Array.from({length: n}, () => `
        <div class="result-skel">
          <div class="skel" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skel" style="height:13px;width:55%;border-radius:6px;"></div>
            <div class="skel" style="height:11px;width:35%;border-radius:6px;"></div>
          </div>
          <div class="skel" style="width:34px;height:34px;border-radius:50%;"></div>
        </div>`).join('')}
    </div>`;
}

// ── ESTADO VAZIO ──────────────────────────────────────────────
function renderEmptyState(query) {
  document.getElementById('emptyTitle').textContent = `Nenhum resultado para "${query}"`;
  document.getElementById('emptyMsg').textContent   = 'Verifique a ortografia ou tente outro termo.';
  const sugs = document.getElementById('emptySuggestions');
  sugs.innerHTML = '';
  EMPTY_SUGGESTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:var(--radius-pill);padding:6px 14px;font-size:0.8125rem;color:var(--white);cursor:pointer;font-family:inherit;';
    btn.textContent = s;
    btn.addEventListener('click', () => {
      document.getElementById('searchInput').value = s;
      triggerSearch(s);
    });
    sugs.appendChild(btn);
  });
}

// ── GERENCIADOR DE ESTADOS ────────────────────────────────────
function showState(state, query) {
  document.getElementById('stateInitial').style.display = state === 'initial' ? 'block' : 'none';
  document.getElementById('stateLoading').style.display = state === 'loading'  ? 'block' : 'none';
  document.getElementById('stateResults').style.display = state === 'results'  ? 'block' : 'none';
  document.getElementById('stateEmpty').style.display   = state === 'empty'    ? 'block' : 'none';
  if (state === 'empty' && query) renderEmptyState(query);
}

// ── HIGHLIGHT DE TEXTO ────────────────────────────────────────
function highlight(text, query) {
  if (!query) return text;
  const safe  = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${safe})`, 'gi');
  return text.replace(regex, `<mark style="background:none;color:var(--green);font-weight:700;">$1</mark>`);
}

// ═══════════════════════════════════════════════════════════════
//  EVENTOS DE INPUT
// ═══════════════════════════════════════════════════════════════

document.getElementById('searchInput').addEventListener('input', function() {
  triggerSearch(this.value);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    this.value = '';
    triggerSearch('');
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  triggerSearch('');
  document.getElementById('searchInput').focus();
});

document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);

// ── FILTROS DE CATEGORIA ──────────────────────────────────────
document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeCategory = this.dataset.cat;
    if (currentQuery) triggerSearch(currentQuery);
  });
});

// Função exposta globalmente para o botão "Partidas" (Fix [38])
function setFilter(filter) {
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-cat="${filter}"]`);
  if (btn) btn.classList.add('active');
  activeCategory = filter;
  if (currentQuery) triggerSearch(currentQuery);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
renderHistory();
renderTrending();
renderPopularTeams();
renderPopularLeagues();

// Pré-preenche via query string (?q=flamengo)
const urlQ = new URLSearchParams(window.location.search).get('q');
if (urlQ) {
  document.getElementById('searchInput').value = urlQ;
  triggerSearch(urlQ);
}

lucide.createIcons();
</script>
