        <div class="sidebar__user-info">
          <div class="sidebar__user-name">·</div>
          <div class="sidebar__user-plan">Plano Free</div>
        </div>
      </div>
      <a href="assinatura.html" class="badge badge--free" style="text-decoration:none;cursor:pointer;">FREE → PRO</a>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="app-main">

  <!-- NAVBAR -->
  <nav class="navbar">
    <button onclick="goBack('home.html')" class="navbar__icon" style="background:none;border:none;cursor:pointer;color:var(--white);display:flex;align-items:center;justify-content:center;">

  <!-- CONTENT -->

        <div style="font-size:0.6875rem;color:var(--gray);">times</div>

      <div style="flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--border);">
        <div style="font-size:1.25rem;font-weight:900;color:var(--gold);" id="favLeagueCount">0</div>
        <div style="font-size:0.6875rem;color:var(--gray);">ligas</div>

      <div style="flex:1;padding:12px 16px;text-align:center;">

    <div class="section-header">

    <div class="section-header" style="margin-top:8px;">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="js/main.js?v=9"></script>
<script>
const LEAGUE_NAMES = {
  BRA: 'Brasileirão',
  ENG: 'Premier League',
  ESP: 'La Liga',
  ITA: 'Serie A',
  GER: 'Bundesliga',
  FRA: 'Ligue 1',
  POR: 'Liga Portugal',
  UCL: 'Champions League'
};

function getFavoritesArr() {
  return getFavorites ? getFavorites() : [];
}
function saveFavoritesArr(arr) {
  try { localStorage.setItem('zebrastats_favorites', JSON.stringify(arr)); } catch {}
}

function renderTeams() {
  const container = document.getElementById('teamsContainer');
  const ids = getFavoritesArr();
  const meta = getFavTeamsData ? getFavTeamsData() : {};

  if (!ids || ids.length === 0) {
    container.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:32px 20px;text-align:center;margin-bottom:10px;">
        <div style="font-size:2.5rem;margin-bottom:12px;">🦓</div>
        <div style="font-weight:600;margin-bottom:6px;">Nenhum time favoritado ainda</div>
        <div style="font-size:0.8125rem;color:var(--gray);margin-bottom:16px;line-height:1.5;">Adicione seus times favoritos para acompanhar suas zebras.</div>
        <a href="explorar.html" class="btn btn--primary" style="display:inline-block;text-decoration:none;">Explorar Times</a>
      </div>`;
    lucide.createIcons();
    return;
  }

  container.innerHTML = '';

  ids.forEach(id => {
    const m = meta[id] || {};
    const name = m.name || id;
    const color = m.color || 'var(--green)';
    const league = m.league || '—';

    // ZI badge
    const zi = m.zi !== undefined ? m.zi : '—';
    function ziClass(v) { return v >= 7 ? 'zi--grande' : v >= 4 ? 'zi--media' : 'zi--leve'; }
    const ziCls = zi !== '—' ? ziClass(parseFloat(zi)) : 'zi--leve';
    const ziBadge = `<span class="zi-badge ${ziCls}" style="margin-top:4px;">🦓 ${zi !== '—' ? parseFloat(zi).toFixed(1) : '—'}</span>`;

    const card = document.createElement('div');
    card.className = 'fav-team-card';
    card.dataset.id = id;
    card.style.cssText = `background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;border-left:3px solid ${color};display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;`;
    card.innerHTML = `
      <div class="drag-handle" title="Arrastar para reordenar" style="cursor:grab;display:flex;align-items:center;justify-content:center;padding:4px;margin-right:2px;color:var(--gray);flex-shrink:0;">
        <i data-lucide="grip-vertical" style="width:16px;height:16px;"></i>
      </div>
      <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:0.9375rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</div>
        <div style="font-size:0.75rem;color:var(--gray);margin-top:2px;">${league}</div>
        ${ziBadge}
      </div>
      <button class="fav-remove-btn" data-id="${id}" data-name="${name}" title="Remover dos favoritos" style="background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;color:var(--red);flex-shrink:0;border-radius:6px;transition:background 0.15s;">
        <i data-lucide="heart-off" style="width:18px;height:18px;"></i>
      </button>`;

    // Card click
    card.addEventListener('click', function(e) {
      if (e.target.closest('.fav-remove-btn')) return;
      window.location.href = 'time.html?team=' + this.dataset.id;
    });

    // Remove button
    card.querySelector('.fav-remove-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFavorite(this.dataset.id, this.dataset.name);
      renderTeams();
    });

    // Drag-and-drop
    card.setAttribute('draggable', 'true');
    card.dataset.teamId = id;

    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', id);
      card.style.opacity = '0.5';
    });
    card.addEventListener('dragend', () => { card.style.opacity = '1'; });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      card.style.borderColor = 'var(--green)';
    });
    card.addEventListener('dragleave', () => { card.style.borderColor = ''; });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.style.borderColor = '';
      const draggedId = e.dataTransfer.getData('text/plain');
      if (draggedId === id) return;
      const favs = getFavoritesArr();
      const fromIdx = favs.indexOf(draggedId);
      const toIdx   = favs.indexOf(id);
      if (fromIdx < 0 || toIdx < 0) return;
      favs.splice(fromIdx, 1);
      favs.splice(toIdx, 0, draggedId);
      saveFavoritesArr(favs);
      renderTeams();
    });

    container.appendChild(card);
  });

  lucide.createIcons();
}

function renderLeagues() {
  const container = document.getElementById('leaguesContainer');
  const ids = getFavLeagues ? getFavLeagues() : [];

  if (!ids || ids.length === 0) {
    container.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:32px 20px;text-align:center;margin-bottom:10px;">
        <div style="font-size:2.5rem;margin-bottom:12px;">⭐</div>
        <div style="font-weight:600;margin-bottom:6px;">Nenhuma liga favoritada ainda</div>
        <div style="font-size:0.8125rem;color:var(--gray);margin-bottom:16px;line-height:1.5;">Adicione ligas para ver zebras e estatísticas das suas competições favoritas.</div>
        <a href="liga.html" class="btn btn--primary" style="display:inline-block;text-decoration:none;">Explorar Ligas</a>
      </div>`;
    lucide.createIcons();
    return;
  }

  let html = '';
  ids.forEach(lid => {
    const name = LEAGUE_NAMES[lid] || lid;
    const flagHtml = flagImg ? flagImg(lid, 20) : '';
    html += `
      <div class="fav-league-card" data-id="${lid}" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;border-left:3px solid var(--gold);display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;">
        <div style="flex-shrink:0;">${flagHtml}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:0.9375rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</div>
        </div>
        <button class="fav-league-remove-btn" data-id="${lid}" data-name="${name}" title="Remover dos favoritos" style="background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0;border-radius:6px;transition:background 0.15s;">
          <i data-lucide="star-off" style="width:18px;height:18px;"></i>
        </button>
      </div>`;
  });
  container.innerHTML = html;

  // Card click → league page
  container.querySelectorAll('.fav-league-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.closest('.fav-league-remove-btn')) return;
      window.location.href = 'liga.html?id=' + this.dataset.id;
    });
  });

  // Remove buttons
  container.querySelectorAll('.fav-league-remove-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFavLeague(this.dataset.id, this.dataset.name);
      renderLeagues();
    });
  });

  lucide.createIcons();
}

// Init
updatePlanBadge && updatePlanBadge();
renderTeams();
renderLeagues();
lucide.createIcons();

(function updateFavStats(){
  const teams = getFavoritesArr ? getFavoritesArr() : [];
  const leagues = getFavLeagues ? getFavLeagues() : [];
  // Conta times com ZI ativo (zi >= 4) com base nos dados salvos
  const teamMeta = (typeof getFavTeamsData === 'function') ? getFavTeamsData() : {};
  const zebraAtiva = teams.filter(id => {
    const zi = parseFloat((teamMeta[id] || {}).zi);
    return !isNaN(zi) && zi >= 4;
  }).length;

  document.getElementById('favTeamCount').textContent = teams.length;
  document.getElementById('favLeagueCount').textContent = leagues.length;
  document.getElementById('favZebraCount').textContent = zebraAtiva;
  // animate counts
  [
    { id:'favTeamCount',   val:teams.length   },
    { id:'favLeagueCount', val:leagues.length },
    { id:'favZebraCount',  val:zebraAtiva     }
  ].forEach(({id,val})=>{
    let n=0; const el=document.getElementById(id);
    if (!el) return;
    const step=()=>{ n=Math.min(n+1,val); el.textContent=n; if(n<val) requestAnimationFrame(step); };
    requestAnimationFrame(step);
  });
})();
</script>

<style>
  /* ── ZI BADGE ────────────────────────────────────────────── */
  .zi-badge { font-size:0.6875rem; font-weight:700; border-radius:6px; padding:2px 6px; display:inline-flex; align-items:center; gap:3px; }
  .zi-badge.zi--grande { color:#EE4444; background:rgba(238,68,68,0.12); }
  .zi-badge.zi--media  { color:#FF8C00; background:rgba(255,140,0,0.12);  }
  .zi-badge.zi--leve   { color:var(--green); background:rgba(46,230,92,0.10); }

  /* ── SHIMMER SKELETON ─────────────────────────────────────── */
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }
  .skel-fav {
    height:72px;border-radius:var(--radius-md);margin-bottom:10px;
    background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);
    background-size:800px 100%;
    animation:shimmer 1.4s infinite;
  }

  /* ── ZEBRA WALK ANIMATION ─────────────────────────────────── */
  @keyframes zebraWalk {
    0%,100% { transform: rotate(-4deg); }
    50%     { transform: rotate(4deg); }
  }
  .empty-zebra-icon {
    font-size:3.5rem;display:inline-block;
    animation: zebraWalk 1.5s ease-in-out infinite;
    transform-origin: bottom center;
  }

  /* ── CARD REVEAL ANIMATION ────────────────────────────────── */
  @keyframes favCardIn {
    from { opacity:0; transform:translateX(-12px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .fav-team-card { animation: favCardIn 0.3s ease both; }

  .sec-ic { width:14px; height:14px; display:inline-block; vertical-align:middle; margin-right:5px; flex-shrink:0; }
  .section-title { display:inline-flex; align-items:center; }
  .bottom-nav__icon i { width:20px; height:20px; display:block; }
  .navbar__icon i { display:block; }

  .fav-team-card:hover,
  .fav-league-card:hover { opacity:0.9; }

  [draggable=true] { touch-action: none; user-select: none; }
  [draggable=true]:active { cursor: grabbing; }

  .fav-remove-btn:hover { background:rgba(238,68,68,0.1) !important; }
  .fav-league-remove-btn:hover { background:rgba(255,200,50,0.1) !important; }

  .btn--primary {
    background:var(--green); color:#000; border:none; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:0.875rem;
    padding:10px 20px; border-radius:var(--radius-pill);
    transition:opacity .15s;
  }
  .btn--primary:hover { opacity:.9; }
</style>
<script src="js/admin.js"></script>
</body>
