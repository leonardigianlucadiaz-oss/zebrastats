<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZebraStats — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* Particle animation background */
    .auth-bg-particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .auth-bg-particles span {
      position: absolute;
      top: -40px;
      width: 3px;
      border-radius: 2px;
      opacity: 0;
      animation: particleFall linear infinite;
      background: var(--green, #00e676);
    }
    @keyframes particleFall {
      0%   { transform: translateY(0)   rotate(15deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
    }
    .phone { z-index: 1; }
    @media (min-width: 768px) {
      .phone { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; }
      .auth-wrapper { width: 420px; padding: 32px 0; }
    }
  </style>
</head>
<body>
  <div class="auth-bg-particles" id="authParticles"></div>
  <div class="phone">
    <div class="auth-wrapper">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo__circle">Z</div>
        <div class="auth-logo__name">Zebra<span>Stats</span></div>
        <p class="auth-logo__tagline">Dados que revelam as zebras do futebol</p>
      </div>

      <!-- Card de Login -->
      <div class="auth-card">
        <div>
          <h2 class="auth-card__title">Entrar</h2>
          <p class="auth-card__subtitle">Acesse sua conta ZebraStats</p>
        </div>

        <form id="loginForm" novalidate>
          <div style="display:flex;flex-direction:column;gap:14px;">

            <div class="form-group">
              <label class="form-label" for="email">E-mail</label>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="seu@email.com"
                autocomplete="email"
                required
              />
              <span class="form-error text-red text-xs" id="emailError" style="display:none;margin-top:2px;"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Senha</label>
              <div style="position:relative;">
                <input
                  class="form-input"
                  type="password"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                  style="padding-right: 44px;"
                />
                <button
                  type="button"
                  id="togglePass"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--gray);"
                  aria-label="Mostrar senha"
                ><i data-lucide="eye" style="width:18px;height:18px;"></i></button>
              </div>
              <span class="form-error text-red text-xs" id="passError" style="display:none;margin-top:2px;"></span>
            </div>

            <div style="text-align:right;margin-top:-6px;">
              <a href="#" class="text-green text-sm">Esqueci minha senha</a>
            </div>

            <button class="btn btn--primary" type="submit" id="loginBtn">
              Entrar
            </button>
          </div>
        </form>

        <div class="divider--text">ou continue com</div>

        <button class="btn btn--outline" type="button" id="googleBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" style="margin-right:8px;flex-shrink:0;" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Entrar com Google
        </button>

        <button class="btn" type="button" id="guestBtn"
          style="background:transparent;border:1px dashed var(--border,#2a2a3e);color:var(--text-muted);margin-top:4px;">
          <i data-lucide="eye" style="width:15px;height:15px;margin-right:6px;"></i>
          Explorar sem cadastro
        </button>
      </div>

      <p class="auth-footer">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Toggle password
    document.getElementById('togglePass').addEventListener('click', function() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.innerHTML = `<i data-lucide="${input.type === 'password' ? 'eye' : 'eye-off'}" style="width:18px;height:18px;"></i>`;
      lucide.createIcons();
    });

    // Verifica se já está logado → redireciona
    (async () => {
      const user = await ZebraAuth.getSessionUser();
      if (user) { window.location.replace('home.html'); return; }

      // Verifica redirect após reset de senha
      const params = new URLSearchParams(location.search);
      if (params.get('reset') === '1') {
        showToast('Senha redefinida! Faça login com a nova senha.');
      }
    })();

    // Form submit — login real
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      let valid = true;

      document.getElementById('emailError').style.display = 'none';
      document.getElementById('passError').style.display  = 'none';

      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('emailError').textContent = 'Digite um e-mail válido.';
        document.getElementById('emailError').style.display = 'block';
        valid = false;
      }
      if (!pass || pass.length < 6) {
        document.getElementById('passError').textContent = 'Senha deve ter ao menos 6 caracteres.';
        document.getElementById('passError').style.display = 'block';
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Entrando...';
      btn.disabled = true;

      const { data, error } = await ZebraAuth.authSignIn(email, pass);
      if (error) {
        btn.textContent = 'Entrar';
        btn.disabled = false;
        let msg = 'E-mail ou senha incorretos.';
        if (error.message?.includes('Email not confirmed'))
          msg = '📧 Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada.';
        else if (error.message?.includes('Invalid login credentials'))
          msg = 'E-mail ou senha incorretos.';
        else if (error.message?.includes('Too many requests'))
          msg = 'Muitas tentativas. Aguarde alguns minutos.';
        else if (error.message?.includes('network') || error.message?.includes('fetch'))
          msg = 'Erro de conexão. Verifique sua internet.';
        document.getElementById('passError').textContent = msg;
        document.getElementById('passError').style.display = 'block';
        return;
      }

      // Login bem-sucedido
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      window.location.href = next ? decodeURIComponent(next) : 'home.html';
    });

    // Botão "Esqueci minha senha"
    document.querySelector('a.text-green')?.addEventListener('click', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('emailError').textContent = 'Digite seu e-mail primeiro.';
        document.getElementById('emailError').style.display = 'block';
        return;
      }
      this.textContent = 'Enviando...';
      const { error } = await ZebraAuth.authResetPassword(email);
      this.textContent = error ? 'Erro ao enviar' : 'E-mail enviado!';
      if (!error) showToast('Verifique sua caixa de entrada para redefinir a senha.');
    });

    // Login com Google
    document.getElementById('googleBtn')?.addEventListener('click', async function() {
      this.textContent = 'Redirecionando...';
      this.disabled = true;
      await ZebraAuth.authSignInGoogle();
    });

    // Entrar como convidado
    document.getElementById('guestBtn')?.addEventListener('click', function() {
      localStorage.setItem('zs_guest', '1');
      localStorage.setItem('zs_user_name', 'Convidado');
      localStorage.setItem('zs_user_plan', 'free');
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      window.location.href = next ? decodeURIComponent(next) : 'home.html';
    });

    // Reset border on input
    ['email','password'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', function() {
        this.style.borderColor = '';
      });
    });

    // Particle generator
    (function() {
      const container = document.getElementById('authParticles');
      if (!container) return;
      const count = 18;
      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        const left = Math.random() * 100;
        const height = 18 + Math.random() * 40;
        const duration = 6 + Math.random() * 10;
        const delay = Math.random() * 10;
        span.style.cssText = `left:${left}%;height:${height}px;animation-duration:${duration}s;animation-delay:${delay}s;`;
        container.appendChild(span);
      }
    })();

    lucide.createIcons();
  </script>
</body>
</html>
