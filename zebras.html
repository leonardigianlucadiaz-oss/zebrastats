<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZebraStats — Zebras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css?v=12" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-wrapper">

  <!-- SIDEBAR (desktop) -->
  <aside class="app-sidebar">
    <a href="home.html" class="sidebar__brand">
      <div class="sidebar__brand-icon">Z</div>
      Zebra<span>Stats</span>
    </a>
    <nav class="sidebar__nav">
      <a href="home.html"    class="sidebar__nav-item"><i data-lucide="home"></i><span>Home</span></a>
      <a href="zebras.html"  class="sidebar__nav-item active"><i data-lucide="activity"></i><span>Zebras</span></a>
      <a href="ranking.html" class="sidebar__nav-item"><i data-lucide="medal"></i><span>Ranking</span></a>
      <a href="comparar.html"class="sidebar__nav-item"><i data-lucide="git-compare"></i><span>Comparar</span></a>
      <a href="alertas.html" class="sidebar__nav-item"><i data-lucide="bell-ring"></i><span>Alertas</span></a>
      <a href="liga.html"    class="sidebar__nav-item"><i data-lucide="trophy"></i><span>Ligas</span></a>
      <a href="time.html"    class="sidebar__nav-item"><i data-lucide="star"></i><span>Times</span></a>
      <a href="perfil.html"  class="sidebar__nav-item"><i data-lucide="user"></i><span>Perfil</span></a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__user-avatar">·</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">·</div>
          <div class="sidebar__user-plan">Plano Free</div>
        </div>
      </div>
      <a href="assinatura.html" class="badge badge--free" style="text-decoration:none;cursor:pointer;">FREE → PRO</a>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="app-main">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="home.html" class="navbar__brand">Zebra<span>Stats</span></a>
    <div class="navbar__actions">
      <a href="busca.html" class="navbar__icon" title="Buscar"><i data-lucide="search" style="width:18px;height:18px;"></i></a>
      <a href="notificacoes.html" class="navbar__icon" title="Notificações"><i data-lucide="bell" style="width:18px;height:18px;"></i></a>
    </div>
  </nav>

  <!-- BARRA DE LIGAS -->
  <section class="section-padded" style="background:var(--card2);padding:12px 16px;border-bottom:1px solid var(--border);">
    <div class="section-header" style="margin-bottom:10px;">
      <span class="section-title" style="font-size:0.875rem;"><i data-lucide="trophy" class="sec-ic"></i>Ligas</span>
      <button id="addLeagueBtn" style="background:none;border:none;color:var(--green);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;">+ Adicionar Liga</button>
    </div>
    <div class="scroll-x" id="leagueBar"></div>
  </section>

  <!-- FILTROS DE MAGNITUDE -->
  <section class="section-padded" style="padding:10px 16px;border-bottom:1px solid var(--border);">
    <div class="scroll-x" style="gap:8px;" id="filterRow">
      <button class="filter-chip active" data-filter="all">Todas</button>
      <button class="filter-chip" data-filter="grande"><i data-lucide="alert-circle" class="chip-ic" style="color:var(--red);"></i>Grande (7+)</button>
      <button class="filter-chip" data-filter="media"><i data-lucide="alert-circle" class="chip-ic" style="color:var(--gold);"></i>Média (4–7)</button>
      <button class="filter-chip" data-filter="leve"><i data-lucide="alert-circle" class="chip-ic" style="color:var(--gray);"></i>Leve (&lt;4)</button>
    </div>
  </section>

  <!-- ZI SLIDER -->
  <div id="ziSliderWrap">
    <label>
      <span>Índice Zebra mínimo</span>
      <span id="ziSliderVal">0</span>
    </label>
    <input type="range" id="ziSlider" min="0" max="10" step="0.5" value="0" />
  </div>

  <!-- HEATMAP SEMANAL -->
  <section class="section-padded" style="padding:12px 16px;border-bottom:1px solid var(--border);background:var(--card2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <span style="font-size:0.75rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;">Intensidade da Semana</span>
      <span style="font-size:0.625rem;color:var(--gray);">zebras por dia</span>
    </div>
    <div id="weekHeatmap" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;"></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;">
      <div id="heatmapLabels" style="display:contents;"></div>
    </div>
    <!-- FIX 1 — heatmap legend -->
    <div style="display:flex;align-items:center;gap:6px;margin-top:6px;justify-content:flex-end;">
      <span style="font-size:0.6rem;color:var(--gray);">menos</span>
      <span style="width:10px;height:10px;border-radius:2px;background:var(--green-dim);display:inline-block;"></span>
      <span style="width:10px;height:10px;border-radius:2px;background:#22c55e99;display:inline-block;"></span>
      <span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block;"></span>
      <span style="font-size:0.6rem;color:var(--gray);">mais</span>
    </div>
  </section>

  <!-- LISTA DE ZEBRAS -->
  <main class="content">
    <div class="section-header">
      <span class="section-title"><i data-lucide="zap" class="sec-ic"></i>Zebras Recentes</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <div style="display:flex;background:var(--card2);border:1px solid var(--border);border-radius:6px;overflow:hidden;">
          <button id="viewCards" class="view-toggle-btn active" title="Cards" onclick="setView('cards')"><i data-lucide="layout-grid" style="width:13px;height:13px;"></i></button>
          <button id="viewList"  class="view-toggle-btn"        title="Lista"  onclick="setView('list')"><i data-lucide="list" style="width:13px;height:13px;"></i></button>
        </div>
        <a href="ranking.html" class="section-link" style="display:inline-flex;align-items:center;gap:3px;"><i data-lucide="medal" style="width:12px;height:12px;"></i>Ranking</a>
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <span class="text-xs text-gray" id="zebraCount"></span>
    </div>

    <div id="zebraList" style="display:flex;flex-direction:column;gap:12px;"></div>

    <!-- LOCK BANNER PRO -->
    <div class="lock-banner" onclick="window.location.href='assinatura.html'">
      <i data-lucide="lock" style="width:20px;height:20px;color:var(--gold);flex-shrink:0;"></i>
      <div>
        <div style="font-size:0.875rem;font-weight:600;">Histórico completo + alertas</div>
        <div style="font-size:0.75rem;font-weight:400;color:var(--gray);margin-top:2px;">Assine o Pro para acesso ilimitado</div>
      </div>
      <i data-lucide="arrow-right" style="margin-left:auto;color:var(--green);width:16px;height:16px;flex-shrink:0;"></i>
    </div>
  </main>

  <!-- BOTTOM NAV (mobile only) -->
  <nav class="bottom-nav">
    <a href="home.html"    class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="home"></i></span>Home</a>
    <a href="zebras.html"  class="bottom-nav__item active"><span class="bottom-nav__icon"><i data-lucide="activity"></i></span>Zebras</a>
    <a href="ranking.html" class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="medal"></i></span>Ranking</a>
    <a href="alertas.html" class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="bell-ring"></i></span>Alertas</a>
    <a href="perfil.html"  class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="user"></i></span>Perfil</a>
  </nav>

  </div><!-- /app-main -->
</div><!-- /app-wrapper -->

<!-- MODAL ADICIONAR LIGA -->
<div class="modal-overlay" id="addLeagueModal">
  <div class="modal">
    <div class="modal__header">
      <span class="modal__title">Adicionar Liga</span>
      <button class="modal__close" id="closeModal">✕</button>
    </div>
    <div class="search-bar" style="margin-bottom:14px;">
      <span class="search-bar__icon">🔍</span>
      <input type="text" placeholder="Buscar liga..." id="leagueSearchInput" />
    </div>
    <div id="allLeaguesList" style="display:flex;flex-direction:column;gap:2px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/auth-guard.js?v=4"></script>
<script src="js/zebra-engine.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js?v=9"></script>
<script>
  const LEAGUES = [
    { id:'BRA', flag:'🇧🇷', name:'Brasileirão Série A', country:'Brasil',     faved:true  },
    { id:'ENG', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', name:'Premier League',    country:'Inglaterra', faved:true  },
    { id:'ESP', flag:'🇪🇸', name:'La Liga',             country:'Espanha',    faved:false },
    { id:'ITA', flag:'🇮🇹', name:'Serie A',             country:'Itália',     faved:false },
    { id:'GER', flag:'🇩🇪', name:'Bundesliga',          country:'Alemanha',   faved:false },
    { id:'FRA', flag:'🇫🇷', name:'Ligue 1',             country:'França',     faved:false },
    { id:'POR', flag:'🇵🇹', name:'Liga Portugal',       country:'Portugal',   faved:false },
    { id:'HOL', flag:'🇳🇱', name:'Eredivisie',          country:'Holanda',    faved:false },
    { id:'ARG', flag:'🇦🇷', name:'Liga Profesional',    country:'Argentina',  faved:false },
    { id:'UCL', flag:'🏆', name:'Champions League',     country:'Europa',     faved:false },
    { id:'UEL', flag:'🟠', name:'Europa League',        country:'Europa',     faved:false },
    { id:'MLS', flag:'🇺🇸', name:'MLS',                 country:'EUA',        faved:false },
  ];

  // Gera datas relativas ao dia atual para dados de exemplo
  (function _fixDemoDatesFn(){
    const _d = (offset, time) => {
      const dt = new Date(); dt.setDate(dt.getDate() - offset);
      return String(dt.getDate()).padStart(2,'0') + '/' + String(dt.getMonth()+1).padStart(2,'0') + ' · ' + time + ' (Demo)';
    };
    window._demoDate = _d;
  })();
  const ZEBRAS = [
    { home:'Botafogo',    away:'Flamengo',    hs:3, as:0, league:'Brasileirão', lid:'BRA', date:_demoDate(0,'16h00'), zi:8.2, odds_h:'4.50', odds_a:'1.75' },
    { home:'Lecce',       away:'Juventus',    hs:2, as:1, league:'Serie A',     lid:'ITA', date:_demoDate(0,'14h00'), zi:7.9, odds_h:'5.20', odds_a:'1.62' },
    { home:'Luton',       away:'Man City',    hs:1, as:0, league:'Premier Lg',  lid:'ENG', date:_demoDate(1,'13h30'), zi:9.1, odds_h:'7.00', odds_a:'1.43' },
    { home:'Mallorca',    away:'Real Madrid', hs:1, as:0, league:'La Liga',     lid:'ESP', date:_demoDate(2,'20h00'), zi:6.4, odds_h:'4.10', odds_a:'1.85' },
    { home:'Empoli',      away:'Inter',       hs:2, as:2, league:'Serie A',     lid:'ITA', date:_demoDate(3,'19h45'), zi:5.1, odds_h:'5.50', odds_a:'1.55' },
    { home:'Augsburg',    away:'Bayern',      hs:2, as:1, league:'Bundesliga',  lid:'GER', date:_demoDate(4,'15h30'), zi:8.7, odds_h:'6.00', odds_a:'1.50' },
    { home:'Bragantino',  away:'Palmeiras',   hs:3, as:1, league:'Brasileirão', lid:'BRA', date:_demoDate(5,'20h00'), zi:4.3, odds_h:'3.10', odds_a:'2.15' },
    { home:'Angers',      away:'PSG',         hs:2, as:0, league:'Ligue 1',     lid:'FRA', date:_demoDate(6,'21h00'), zi:9.4, odds_h:'8.50', odds_a:'1.38' },
    { home:'Granada',     away:'Barça',       hs:1, as:0, league:'La Liga',     lid:'ESP', date:_demoDate(7,'19h00'), zi:8.0, odds_h:'5.80', odds_a:'1.55' },
    { home:'Clermont',    away:'Monaco',      hs:3, as:2, league:'Ligue 1',     lid:'FRA', date:_demoDate(8,'17h00'), zi:3.8, odds_h:'2.90', odds_a:'2.30' },
  ];

  let activeLeague = 'all';
  let activeFilter = 'all';
  // Carrega ligas extras persitidas (adicionadas pelo modal)
  const _extraFaved = new Set(JSON.parse(localStorage.getItem('zs_faved_leagues_extra') || '[]'));
  LEAGUES.forEach(l => { if (_extraFaved.has(l.id)) l.faved = true; });

  function ziClass(z) {
    if (z.zi >= 7) return 'grande';
    if (z.zi >= 4) return 'media';
    return 'leve';
  }

  function ziLabel(cls) {
    return { grande:'🔴 Grande', media:'🟠 Média', leve:'🟡 Leve' }[cls];
  }

  // ── ZI MAGNITUDE HELPER ──────────────────────────────────────
  let _ziMinFilter = 0;
  function _ziMagnitude(zi) {
    if (zi >= 8) return { label: 'ÉPICA', color: 'var(--red)', glow: '0 0 8px rgba(255,50,50,0.5)' };
    if (zi >= 5) return { label: 'FORTE', color: 'var(--gold)', glow: '0 0 8px rgba(255,200,50,0.4)' };
    return { label: 'LEVE', color: 'var(--gray)', glow: 'none' };
  }

  // ── LEAGUE BAR ──────────────────────────────────────────────
  function renderLeagueBar() {
    const bar = document.getElementById('leagueBar');
    bar.innerHTML = '';

    const allPill = document.createElement('div');
    allPill.className = `league-fav-pill${activeLeague === 'all' ? ' active-league' : ''}`;
    allPill.innerHTML = `<span class="league-fav-pill__label" style="padding:6px 14px;display:flex;align-items:center;gap:5px;"><i data-lucide="globe" style="width:13px;height:13px;"></i> Todas</span>`;
    allPill.addEventListener('click', () => { activeLeague = 'all'; renderLeagueBar(); renderZebras(); initRealData(); lucide.createIcons(); });
    bar.appendChild(allPill);

    LEAGUES.forEach(l => {
      const cached    = LEAGUE_LOGOS[l.id] || '';
      // Usa logo SDB cacheado OU bandeira via flagcdn (jamais emoji regional)
      const logoHtml  = cached
        ? `<img src="${cached}" style="width:14px;height:14px;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none';">`
        : flagImg(l.id, 14);
      const shortName = l.name.split(' ')[0];

      const pill = document.createElement('div');
      pill.className = `league-fav-pill${activeLeague === l.id ? ' active-league' : ''}`;
      pill.innerHTML = `
        <span class="league-fav-pill__label" data-lid="${l.id}" style="display:flex;align-items:center;gap:5px;"><span id="zbl-${l.id}">${logoHtml}</span>${shortName}</span>
        <button class="league-fav-pill__star${l.faved ? ' faved' : ''}" data-star="${l.id}" title="${l.faved ? 'Remover' : 'Favoritar'}">★</button>
      `;
      pill.querySelector('[data-lid]').addEventListener('click', () => {
        activeLeague = l.id;
        renderLeagueBar();
        renderZebras(); initRealData();
        loadLeagueCrests(l.id);
      });
      pill.querySelector('[data-star]').addEventListener('click', e => {
        e.stopPropagation();
        const wasFaved = l.faved;
        l.faved = !l.faved;
        toggleFavLeague(l.id, l.name);
        renderLeagueBar();
        if (!wasFaved) loadLeagueLogo(l.id).then(() => renderLeagueBar());
      });
      bar.appendChild(pill);

      // Carrega logo SDB (logo oficial substitui a bandeira)
      if (!cached) {
        loadLeagueLogo(l.id).then(badge => {
          if (!badge) return;
          const slot = document.getElementById(`zbl-${l.id}`);
          if (slot) slot.innerHTML = `<img src="${badge}" style="width:14px;height:14px;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none';">`;
        });
      }
    });
  }

  // ── ZEBRA LIST ───────────────────────────────────────────────
  function renderZebras() {
    window._zebraShowAll = false;
    const container = document.getElementById('zebraList');
    container.innerHTML = '';
    const isPro = getUserPlan() !== 'free';

    let data = [...ZEBRAS];
    let list = data;
    if (activeLeague !== 'all') list = list.filter(z => z.lid === activeLeague);
    if (activeFilter !== 'all') list = list.filter(z => ziClass(z) === activeFilter);
    if (_ziMinFilter > 0) list = list.filter(z => (parseFloat(z.zi)||0) >= _ziMinFilter);

    document.getElementById('zebraCount').textContent = `${list.length} resultado${list.length !== 1 ? 's' : ''}`;

    if (!list.length) {
      container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gray);">
        <div style="font-size:2rem;margin-bottom:8px;">🦓</div>
        <div style="font-weight:600;margin-bottom:4px;">Nenhuma zebra encontrada</div>
        <div style="font-size:0.8125rem;">Tente outro filtro ou liga</div>
      </div>`;
      return;
    }

    function zbCrest(url, name) {
      const abbr = name.substring(0,3).toUpperCase();
      const inner = url
        ? `<img src="${url}" alt="${name}" style="width:36px;height:36px;object-fit:contain;" loading="lazy" onerror="this.style.display='none';">`
        : `<span style="font-size:0.5625rem;font-weight:700;color:var(--gray);">${abbr}</span>`;
      return `<div style="width:40px;height:40px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">${inner}</div>`;
    }

    list.forEach((z, i) => {
      const cls   = ziClass(z);
      const label = ziLabel(cls);
      const locked = i >= 4 && !isPro;

      const card = document.createElement('div');
      card.className = 'zebra-card';
      card.dataset.zi = z.zi || 0;
      const ziLevel = parseFloat(z.zi || 0) >= 7 ? 'grande' : parseFloat(z.zi || 0) >= 4 ? 'media' : 'leve';
      card.setAttribute('data-zi-level', ziLevel);
      const mag = _ziMagnitude(parseFloat(z.zi)||0);
      card.style.boxShadow = mag.glow;

      const leagueBadge = LEAGUE_LOGOS[z.lid] || '';
      const leagueLogoHtml = leagueBadge
        ? `<img src="${leagueBadge}" style="width:12px;height:12px;object-fit:contain;vertical-align:middle;margin-right:3px;" onerror="this.remove();">`
        : '';

      const hcUrl = getCrest(z.home);
      const acUrl = getCrest(z.away);

      // Barra de probabilidade (proporção de odds)
      const hOdd = parseFloat(z.odds_h) || 4.5;
      const aOdd = parseFloat(z.odds_a) || 1.7;
      const probH = Math.round((1/hOdd) * 100);
      const probA = Math.round((1/aOdd) * 100);
      const probE = Math.max(0, 100 - probH - probA);

      if (locked) {
        card.style.cssText = 'position:relative;overflow:hidden;';
        card.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <span class="text-xs text-gray">${leagueLogoHtml}${z.league} · ${z.date}</span>
            <span class="zebra-index-badge zi--${cls}">🦓 ${z.zi} ${label}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;filter:blur(4px);pointer-events:none;user-select:none;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(hcUrl, z.home)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.home}</span>
            </div>
            <div style="text-align:center;">
              <div style="font-size:1.625rem;font-weight:800;letter-spacing:-1px;">${z.hs} – ${z.as}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(acUrl, z.away)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.away}</span>
            </div>
          </div>
          <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,var(--card) 70%);display:flex;align-items:flex-end;justify-content:center;padding:14px;">
            <a href="assinatura.html" style="font-size:0.8125rem;color:var(--green);font-weight:700;text-decoration:none;background:var(--green-dim);border:1px solid rgba(46,230,92,0.3);padding:8px 20px;border-radius:var(--radius-pill);">🔒 Ver com Pro</a>
          </div>`;
      } else {
        card.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <span class="text-xs text-gray">${leagueLogoHtml}${z.league} · ${z.date}</span>
            <span class="zebra-index-badge zi--${cls}">🦓 ${z.zi} ${label}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:12px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(hcUrl, z.home)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.home}</span>
              <span style="font-size:0.625rem;color:var(--green);font-weight:700;">Azarão</span>
            </div>
            <div style="text-align:center;">
              <div style="font-size:1.75rem;font-weight:800;letter-spacing:-1px;">${z.hs} – ${z.as}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(acUrl, z.away)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.away}</span>
              <span style="font-size:0.625rem;color:var(--gray);">Favorito</span>
            </div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:0.625rem;color:var(--gray);margin-bottom:4px;">
              <span>${z.home} ${probH}%</span>
              <span>Empate ${probE}%</span>
              <span>${z.away} ${probA}%</span>
            </div>
            <div style="display:flex;gap:2px;height:5px;border-radius:3px;overflow:hidden;">
              <div style="flex:${probH};background:var(--green);"></div>
              <div style="flex:${probE};background:var(--border);"></div>
              <div style="flex:${probA};background:var(--red);"></div>
            </div>
          </div>
          <div style="display:flex;gap:12px;padding-top:10px;border-top:1px solid var(--border);align-items:center;">
            <div>
              <div style="font-size:0.625rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Odd azarão</div>
              <div style="font-size:0.9375rem;font-weight:700;color:var(--green);">${z.odds_h}</div>
            </div>
            <div>
              <div style="font-size:0.625rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Odd favorito</div>
              <div style="font-size:0.9375rem;font-weight:700;color:var(--red);">${z.odds_a}</div>
            </div>
            <a href="#" onclick="event.stopPropagation();(function(z){const zi=parseFloat(z.zi||0);const p=new URLSearchParams({home:z.home||'',away:z.away||'',score:z.hs!==undefined?z.hs+' – '+z.as:'',zi:z.zi||'',league:z.league||'Futebol',date:z.date||'',ziClass:zi>=7?'grande':zi>=4?'media':'leve'});window.location.href='partida.html?'+p.toString();})(${JSON.stringify({home:z.home,away:z.away,hs:z.hs,as:z.as,zi:z.zi,league:z.league,date:z.date})})" style="margin-left:auto;font-size:0.75rem;color:var(--green);font-weight:600;text-decoration:none;display:flex;align-items:center;gap:3px;">Ver detalhes <i data-lucide="arrow-right" style="width:13px;height:13px;"></i></a>
          </div>`;
      }

      card.classList.add('zebra-card-anim');
      card.style.animationDelay = (i * 0.05) + 's';
      card.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') return;
        // If clicking inside the expanded detail accordion, toggle it closed
        if (e.target.closest('.zebra-detail')) {
          const existing = this.querySelector('.zebra-detail');
          if (existing) { existing.remove(); this.classList.remove('zebra-card--expanded'); }
          return;
        }
        // Build params and navigate to partida.html
        const zi = parseFloat(z.zi || z.index || 0);
        const ziClass = zi >= 7 ? 'grande' : zi >= 4 ? 'media' : 'leve';
        // Store real match ID so partida.html can fetch live data
        if (z.id) {
          try {
            localStorage.setItem('zs_current_match_id', String(z.id));
            localStorage.setItem('zs_current_match_lid', z.lid || '');
          } catch {}
        } else {
          try { localStorage.removeItem('zs_current_match_id'); } catch {}
        }
        const navParams = new URLSearchParams({
          home:   z.home   || z.homeTeam  || '',
          away:   z.away   || z.awayTeam  || '',
          score:  z.hs !== undefined ? `${z.hs} – ${z.as}` : '',
          zi:     z.zi     || z.index     || '',
          league: z.league || z.liga      || 'Futebol',
          date:   z.date   || z.data      || '',
          ziClass,
          ...(z.id ? { fixtureId: z.id } : {}),
        });
        window.location.href = `partida.html?${navParams.toString()}`;
      });
      container.appendChild(card);
    });
    // Remove previous "ver mais" button
    const oldBtn = document.getElementById('zebraLoadMore');
    if (oldBtn) oldBtn.remove();

    if (list.length > 6 && !window._zebraShowAll) {
      // Only show first 6
      const cards = container.querySelectorAll('.zebra-card');
      cards.forEach((c, i) => { if (i >= 6) c.style.display = 'none'; });
      const moreBtn = document.createElement('button');
      moreBtn.id = 'zebraLoadMore';
      moreBtn.className = 'btn btn--secondary';
      moreBtn.style.cssText = 'width:100%;margin-top:12px;';
      moreBtn.innerHTML = `<i data-lucide="chevrons-down" style="width:16px;height:16px;margin-right:6px;"></i>Ver mais ${list.length - 6} zebras`;
      moreBtn.addEventListener('click', () => {
        window._zebraShowAll = true;
        cards.forEach(c => { c.style.display = ''; });
        moreBtn.remove();
        lucide.createIcons();
      });
      container.appendChild(moreBtn);
      lucide.createIcons();
    }

    // Re-render lucide icons for arrow-right inside cards
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  // ── FILTROS DE MAGNITUDE ─────────────────────────────────────
  document.querySelectorAll('#filterRow .filter-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('#filterRow .filter-chip').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      activeFilter = this.dataset.filter;
      renderZebras();
    });
  });

  // ── MODAL ────────────────────────────────────────────────────
  const modal = document.getElementById('addLeagueModal');

  document.getElementById('addLeagueBtn').addEventListener('click', () => {
    modal.classList.add('show');
    renderModalLeagues('');
    document.getElementById('leagueSearchInput').focus();
  });
  document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('show'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });
  document.getElementById('leagueSearchInput').addEventListener('input', e => renderModalLeagues(e.target.value));

  function renderModalLeagues(query) {
    const container = document.getElementById('allLeaguesList');
    container.innerHTML = '';
    const filtered = LEAGUES.filter(l =>
      l.name.toLowerCase().includes(query.toLowerCase()) ||
      l.country.toLowerCase().includes(query.toLowerCase())
    );
    if (!filtered.length) {
      container.innerHTML = `<p style="text-align:center;padding:20px;color:var(--gray);font-size:0.875rem;">Nenhuma liga encontrada</p>`;
      return;
    }
    filtered.forEach(l => {
      const item = document.createElement('div');
      item.className = `league-list-item${l.faved ? ' added' : ''}`;
      item.innerHTML = `
        <span class="league-list-item__flag">${l.flag}</span>
        <div style="flex:1;">
          <div class="league-list-item__name">${l.name}</div>
          <div style="font-size:0.75rem;color:var(--gray);">${l.country}</div>
        </div>
        <span class="league-list-item__action">${l.faved ? '✓ Adicionada' : '+ Adicionar'}</span>
      `;
      item.addEventListener('click', () => {
        l.faved = !l.faved;
        // Persistir estado no localStorage
        if (l.faved) _extraFaved.add(l.id); else _extraFaved.delete(l.id);
        try { localStorage.setItem('zs_faved_leagues_extra', JSON.stringify([..._extraFaved])); } catch {}
        // Sincroniza com favoritos globais (main.js)
        toggleFavLeague(l.id, l.name);
        renderModalLeagues(query);
        renderLeagueBar();
        showToast(l.faved ? `⭐ ${l.name} adicionada` : `${l.name} removida`);
      });
      container.appendChild(item);
    });
  }

  // ── HEATMAP SEMANAL ──────────────────────────────────────────────
  function buildHeatmap(counts) {
    const days      = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const dayCounts = counts || [0,0,0,0,0,0,0]; // Sun=0 … Sat=6
    const max       = Math.max(...dayCounts) || 1;

    const grid   = document.getElementById('weekHeatmap');
    if (!grid) return;

    grid.innerHTML = '';

    dayCounts.forEach((n, i) => {
      const pct   = n / max;
      const alpha = 0.08 + pct * 0.7;
      const isHot = n === max;
      const cell  = document.createElement('div');
      cell.style.cssText = `
        height: 40px;
        border-radius: 6px;
        background: rgba(46,230,92,${alpha.toFixed(2)});
        border: 1px solid rgba(46,230,92,${(alpha * 0.6).toFixed(2)});
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 2px; cursor: pointer;
        position: relative;
        transition: transform 0.15s;
      `;
      if (isHot) cell.style.boxShadow = '0 0 8px rgba(46,230,92,0.3)';
      cell.innerHTML = `
        <span style="font-size:0.875rem;font-weight:800;color:${pct > 0.5 ? 'var(--white)' : 'var(--gray)'};">${n}</span>
        <span style="font-size:0.5rem;color:${pct > 0.5 ? 'rgba(255,255,255,0.7)' : 'var(--gray)'};">${days[i]}</span>
      `;
      cell.addEventListener('mouseenter', () => cell.style.transform = 'scaleY(1.04)');
      cell.addEventListener('mouseleave', () => cell.style.transform = '');
      cell.title = `${n} zebra${n !== 1 ? 's' : ''} ${days[i] === days[new Date().getDay()] ? '(hoje)' : ''}`;
      grid.appendChild(cell);
    });
  }

  // ── VIEW TOGGLE ───────────────────────────────────────────────────
  let currentView = 'cards';
  function setView(mode) { // FIX 21 — direct style manipulation instead of CSS class
    currentView = mode;
    document.getElementById('viewCards').classList.toggle('active', mode === 'cards');
    document.getElementById('viewList').classList.toggle('active', mode === 'list');
    const list = document.getElementById('zebraList');
    if (mode === 'list') {
      list.style.gap = '4px';
      list.querySelectorAll('.zebra-card,.card').forEach(c => {
        c.style.padding = '8px 12px';
        c.querySelectorAll('[data-hide-list]').forEach(el => { el.style.display = 'none'; });
      });
    } else {
      list.style.gap = '12px';
      list.querySelectorAll('.zebra-card,.card').forEach(c => {
        c.style.padding = '';
        c.querySelectorAll('[data-hide-list]').forEach(el => { el.style.display = ''; });
      });
    }
    lucide.createIcons();
  }

  // ── INIT ─────────────────────────────────────────────────────
  updatePlanBadge();
  buildHeatmap();
  renderLeagueBar();
  renderZebras();

  // Pré-carrega logos de ligas e escudos das ligas padrão
  (async () => {
    const favLids = LEAGUES.filter(l => l.faved).map(l => l.id);
    await Promise.all(favLids.map(lid => loadLeagueLogo(lid)));
    renderLeagueBar(); // re-renderiza com logos
    lucide.createIcons();
    await Promise.all(favLids.map(lid => loadLeagueCrests(lid)));
    renderZebras(); // re-renderiza com escudos
  })();

  // ── INTEGRAÇÃO COM APIS ──────────────────────────────────────
  const _CACHE_KEY = 'zs_zebras_cache';
  const _CACHE_TTL = 30 * 60 * 1000; // 30 min

  function _loadCache() {
    try {
      const raw = localStorage.getItem(_CACHE_KEY);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > _CACHE_TTL) return null;
      return data;
    } catch { return null; }
  }
  function _saveCache(data) {
    try { localStorage.setItem(_CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }

  async function initRealData() {
    if (typeof ZebraAPI === 'undefined' || !ZebraAPI.isConfigured.footballData()) return;
    if (typeof ZebraEngine === 'undefined') return;

    // Show cached data immediately (no lag)
    const cached = _loadCache();
    if (cached && cached.length) {
      ZEBRAS.length = 0;
      ZEBRAS.push(...cached);
      renderZebras();
      const countEl = document.getElementById('zebraCount');
      if (countEl) countEl.textContent = `${cached.length} zebras ⚡`;
    }

    const FETCH_ALL = ['ENG','ESP','ITA','GER','BRA','FRA','POR'];
    const lid = (activeLeague && activeLeague !== 'all') ? activeLeague.toUpperCase() : null;
    try {
      let allZebras = [];
      if (lid) {
        allZebras = await ZebraAPI.fetchRealZebras(lid, 20);
      } else {
        const results = await Promise.allSettled(
          FETCH_ALL.map(l => ZebraAPI.fetchRealZebras(l, 10))
        );
        allZebras = results
          .filter(r => r.status === 'fulfilled' && Array.isArray(r.value))
          .flatMap(r => r.value)
          .sort((a, b) => b.zi - a.zi);
      }
      if (!allZebras.length) return;
      _saveCache(allZebras);
      ZEBRAS.length = 0;
      ZEBRAS.push(...allZebras);
      renderZebras();
      const countEl = document.getElementById('zebraCount');
      if (countEl) countEl.textContent = `${allZebras.length} zebras reais ⚡`;
      const dayCounts = [0,0,0,0,0,0,0];
      allZebras.forEach(z => {
        if (z.date) {
          const [d,m] = z.date.split('/').map(Number);
          const dt = new Date(new Date().getFullYear(), m-1, d);
          dayCounts[dt.getDay()]++;
        }
      });
      buildHeatmap(dayCounts);
    } catch(e) { console.warn('[Zebras] initRealData:', e.message); }
  }

  initRealData();
  initBellBadge();

  // ZI Slider
  (function() {
    const slider = document.getElementById('ziSlider');
    const valEl  = document.getElementById('ziSliderVal');
    if (!slider) return;
    slider.addEventListener('input', function() {
      _ziMinFilter = parseFloat(this.value);
      valEl.textContent = _ziMinFilter;
      renderZebras();
      lucide.createIcons();
    });
  })();

  lucide.createIcons();
</script>
<style>
  .bottom-nav__icon i { width: 20px; height: 20px; display: block; }
  .chip-ic { width: 12px; height: 12px; display: block; flex-shrink: 0; }
  .sec-ic  { width: 14px; height: 14px; display: inline-block; vertical-align: middle; margin-right: 5px; flex-shrink: 0; }
  .section-title { display: inline-flex; align-items: center; }
  .filter-chip { display: inline-flex; align-items: center; gap: 5px; }
  .navbar__icon i { display: block; }

  /* ── VIEW TOGGLE ── */
  .view-toggle-btn {
    background: none; border: none; cursor: pointer;
    padding: 5px 7px; color: var(--gray);
    display: flex; align-items: center;
    transition: background var(--transition), color var(--transition);
  }
  .view-toggle-btn.active { background: var(--green-dim); color: var(--green); }
  .view-toggle-btn i { display: block; }

  /* ── LIST MODE ── */
  .zebra-list-mode {
    padding: 8px 12px !important;
  }
  .zebra-list-mode .zebra-card__teams,
  .zebra-list-mode .gc-team-block span:not(.gc-team-name) { display: none; }

  /* ── STAGGER ANIMATION ── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardSlideIn {
    from { opacity: 0; transform: translateX(-14px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .zebra-card-anim {
    animation: cardSlideIn 0.3s ease forwards;
    opacity: 0;
  }

  /* ── ZI SLIDER ── */
  #ziSliderWrap {
    padding: 10px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--card2);
  }
  #ziSliderWrap label {
    font-size: 0.75rem; color: var(--gray);
    display: flex; justify-content: space-between; margin-bottom: 6px;
  }
  #ziSlider {
    width: 100%; accent-color: var(--green);
    cursor: pointer;
  }

  /* ── ACCORDION EXPAND ── */
  .zebra-card--expanded { border-color: var(--green) !important; }
  .zebra-detail { animation: fadeSlideIn 0.2s ease both; }

  /* ZI-proportional visual weight */
  [data-zi-level="grande"] {
    border-color: rgba(238,68,68,0.5) !important;
    border-width: 2px !important;
    box-shadow: 0 0 16px rgba(238,68,68,0.15), 0 2px 8px rgba(0,0,0,0.3) !important;
  }
  [data-zi-level="media"] {
    border-color: rgba(255,140,0,0.45) !important;
    border-width: 2px !important;
    box-shadow: 0 0 12px rgba(255,140,0,0.1), 0 2px 6px rgba(0,0,0,0.3) !important;
  }
  [data-zi-level="leve"] {
    /* default card style, no extra glow */
    box-shadow: 0 1px 4px rgba(0,0,0,0.3) !important;
  }
  /* Grande cards get slightly more height/padding */
  [data-zi-level="grande"] .game-card__match,
  [data-zi-level="grande"].zebra-card {
    padding: 16px !important;
  }
</style>
</body>
</html>
