<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZebraStats — Zebras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-wrapper">

  <!-- SIDEBAR (desktop) -->
  <aside class="app-sidebar">
    <a href="home.html" class="sidebar__brand">
      <div class="sidebar__brand-icon">Z</div>
      Zebra<span>Stats</span>
    </a>
    <nav class="sidebar__nav">
      <a href="home.html"   class="sidebar__nav-item"><i data-lucide="home"></i><span>Home</span></a>
      <a href="zebras.html" class="sidebar__nav-item"><i data-lucide="activity"></i><span>Zebras</span></a>
      <a href="liga.html"   class="sidebar__nav-item"><i data-lucide="trophy"></i><span>Ligas</span></a>
      <a href="time.html"   class="sidebar__nav-item"><i data-lucide="star"></i><span>Times</span></a>
      <a href="perfil.html" class="sidebar__nav-item"><i data-lucide="user"></i><span>Perfil</span></a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__user-avatar">G</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">Gianluca</div>
          <div class="sidebar__user-plan">Plano Free</div>
        </div>
      </div>
      <a href="assinatura.html" class="badge badge--free" style="text-decoration:none;cursor:pointer;">FREE → PRO</a>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="app-main">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="home.html" class="navbar__brand">Zebra<span>Stats</span></a>
    <div class="navbar__actions">
      <span class="badge badge--free" id="planBadge">FREE</span>
      <a href="busca.html" class="navbar__icon" title="Buscar"><i data-lucide="search" style="width:18px;height:18px;"></i></a>
      <a href="notificacoes.html" class="navbar__icon" title="Notificações"><i data-lucide="bell" style="width:18px;height:18px;"></i></a>
    </div>
  </nav>

  <!-- BARRA DE LIGAS -->
  <section style="background:var(--card2);padding:12px 16px;border-bottom:1px solid var(--border);">
    <div class="section-header" style="margin-bottom:10px;">
      <span class="section-title" style="font-size:0.875rem;">🏆 Ligas</span>
      <button id="addLeagueBtn" style="background:none;border:none;color:var(--green);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;">+ Adicionar Liga</button>
    </div>
    <div class="scroll-x" id="leagueBar"></div>
  </section>

  <!-- FILTROS DE MAGNITUDE -->
  <section style="padding:10px 16px;border-bottom:1px solid var(--border);">
    <div class="scroll-x" style="gap:8px;" id="filterRow">
      <button class="filter-chip active" data-filter="all">Todas</button>
      <button class="filter-chip" data-filter="grande">🔴 Grande (7+)</button>
      <button class="filter-chip" data-filter="media">🟠 Média (4–7)</button>
      <button class="filter-chip" data-filter="leve">🟡 Leve (&lt;4)</button>
    </div>
  </section>

  <!-- LISTA DE ZEBRAS -->
  <main class="content">
    <div class="section-header">
      <span class="section-title">🦓 Zebras Recentes</span>
      <span class="text-xs text-gray" id="zebraCount"></span>
    </div>

    <div id="zebraList" style="display:flex;flex-direction:column;gap:12px;"></div>

    <!-- LOCK BANNER PRO -->
    <div class="lock-banner" onclick="window.location.href='assinatura.html'">
      <i data-lucide="lock" style="width:20px;height:20px;color:var(--gold);flex-shrink:0;"></i>
      <div>
        <div style="font-size:0.875rem;font-weight:600;">Histórico completo + alertas</div>
        <div style="font-size:0.75rem;font-weight:400;color:var(--gray);margin-top:2px;">Assine o Pro para acesso ilimitado</div>
      </div>
      <i data-lucide="arrow-right" style="margin-left:auto;color:var(--green);width:16px;height:16px;flex-shrink:0;"></i>
    </div>
  </main>

  <!-- BOTTOM NAV (mobile only) -->
  <nav class="bottom-nav">
    <a href="home.html"   class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="home"></i></span>Home</a>
    <a href="zebras.html" class="bottom-nav__item active"><span class="bottom-nav__icon"><i data-lucide="activity"></i></span>Zebras</a>
    <a href="liga.html"   class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="trophy"></i></span>Ligas</a>
    <a href="time.html"   class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="star"></i></span>Times</a>
    <a href="perfil.html" class="bottom-nav__item"><span class="bottom-nav__icon"><i data-lucide="user"></i></span>Perfil</a>
  </nav>

  </div><!-- /app-main -->
</div><!-- /app-wrapper -->

<!-- MODAL ADICIONAR LIGA -->
<div class="modal-overlay" id="addLeagueModal">
  <div class="modal">
    <div class="modal__header">
      <span class="modal__title">Adicionar Liga</span>
      <button class="modal__close" id="closeModal">✕</button>
    </div>
    <div class="search-bar" style="margin-bottom:14px;">
      <span class="search-bar__icon">🔍</span>
      <input type="text" placeholder="Buscar liga..." id="leagueSearchInput" />
    </div>
    <div id="allLeaguesList" style="display:flex;flex-direction:column;gap:2px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script>
  const LEAGUES = [
    { id:'BRA', flag:'🇧🇷', name:'Brasileirão Série A', country:'Brasil',     faved:true  },
    { id:'ENG', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', name:'Premier League',    country:'Inglaterra', faved:true  },
    { id:'ESP', flag:'🇪🇸', name:'La Liga',             country:'Espanha',    faved:false },
    { id:'ITA', flag:'🇮🇹', name:'Serie A',             country:'Itália',     faved:false },
    { id:'GER', flag:'🇩🇪', name:'Bundesliga',          country:'Alemanha',   faved:false },
    { id:'FRA', flag:'🇫🇷', name:'Ligue 1',             country:'França',     faved:false },
    { id:'POR', flag:'🇵🇹', name:'Liga Portugal',       country:'Portugal',   faved:false },
    { id:'HOL', flag:'🇳🇱', name:'Eredivisie',          country:'Holanda',    faved:false },
    { id:'ARG', flag:'🇦🇷', name:'Liga Profesional',    country:'Argentina',  faved:false },
    { id:'UCL', flag:'🏆', name:'Champions League',     country:'Europa',     faved:false },
    { id:'UEL', flag:'🟠', name:'Europa League',        country:'Europa',     faved:false },
    { id:'MLS', flag:'🇺🇸', name:'MLS',                 country:'EUA',        faved:false },
  ];

  const ZEBRAS = [
    { home:'Botafogo',    away:'Flamengo',    hs:3, as:0, league:'Brasileirão', lid:'BRA', date:'Hoje · 16h00',   zi:8.2, odds_h:'4.50', odds_a:'1.75' },
    { home:'Lecce',       away:'Juventus',    hs:2, as:1, league:'Serie A',     lid:'ITA', date:'Hoje · 14h00',   zi:7.9, odds_h:'5.20', odds_a:'1.62' },
    { home:'Luton',       away:'Man City',    hs:1, as:0, league:'Prem. League',lid:'ENG', date:'Ontem · 13h30',  zi:9.1, odds_h:'7.00', odds_a:'1.43' },
    { home:'Mallorca',    away:'Real Madrid', hs:1, as:0, league:'La Liga',     lid:'ESP', date:'09/05 · 20h00',  zi:6.4, odds_h:'4.10', odds_a:'1.85' },
    { home:'Empoli',      away:'Inter',       hs:2, as:2, league:'Serie A',     lid:'ITA', date:'08/05 · 19h45',  zi:5.1, odds_h:'5.50', odds_a:'1.55' },
    { home:'Augsburg',    away:'Bayern',      hs:2, as:1, league:'Bundesliga',  lid:'GER', date:'07/05 · 15h30',  zi:8.7, odds_h:'6.00', odds_a:'1.50' },
    { home:'Bragantino',  away:'Palmeiras',   hs:3, as:1, league:'Brasileirão', lid:'BRA', date:'06/05 · 20h00',  zi:4.3, odds_h:'3.10', odds_a:'2.15' },
    { home:'Angers',      away:'PSG',         hs:2, as:0, league:'Ligue 1',     lid:'FRA', date:'05/05 · 21h00',  zi:9.4, odds_h:'8.50', odds_a:'1.38' },
    { home:'Granada',     away:'Barça',       hs:1, as:0, league:'La Liga',     lid:'ESP', date:'04/05 · 19h00',  zi:8.0, odds_h:'5.80', odds_a:'1.55' },
    { home:'Clermont',    away:'Monaco',      hs:3, as:2, league:'Ligue 1',     lid:'FRA', date:'03/05 · 17h00',  zi:3.8, odds_h:'2.90', odds_a:'2.30' },
  ];

  let activeLeague = 'all';
  let activeFilter = 'all';

  function ziClass(z) {
    if (z.zi >= 7) return 'grande';
    if (z.zi >= 4) return 'media';
    return 'leve';
  }

  function ziLabel(cls) {
    return { grande:'🔴 Grande', media:'🟠 Média', leve:'🟡 Leve' }[cls];
  }

  // ── LEAGUE BAR ──────────────────────────────────────────────
  function renderLeagueBar() {
    const bar = document.getElementById('leagueBar');
    bar.innerHTML = '';

    const allPill = document.createElement('div');
    allPill.className = `league-fav-pill${activeLeague === 'all' ? ' active-league' : ''}`;
    allPill.innerHTML = `<span class="league-fav-pill__label" style="padding:6px 14px;display:flex;align-items:center;gap:5px;"><i data-lucide="globe" style="width:13px;height:13px;"></i> Todas</span>`;
    allPill.addEventListener('click', () => { activeLeague = 'all'; renderLeagueBar(); renderZebras(); lucide.createIcons(); });
    bar.appendChild(allPill);

    LEAGUES.forEach(l => {
      const cached = LEAGUE_LOGOS[l.id] || '';
      const logoHtml = cached
        ? `<img src="${cached}" style="width:14px;height:14px;object-fit:contain;flex-shrink:0;" onerror="this.remove();">`
        : `<span>${l.flag}</span>`;
      const shortName = l.name.split(' ')[0];

      const pill = document.createElement('div');
      pill.className = `league-fav-pill${activeLeague === l.id ? ' active-league' : ''}`;
      pill.innerHTML = `
        <span class="league-fav-pill__label" data-lid="${l.id}" style="display:flex;align-items:center;gap:5px;">${logoHtml}${shortName}</span>
        <button class="league-fav-pill__star${l.faved ? ' faved' : ''}" data-star="${l.id}" title="${l.faved ? 'Remover' : 'Favoritar'}">★</button>
      `;
      pill.querySelector('[data-lid]').addEventListener('click', () => {
        activeLeague = l.id;
        renderLeagueBar();
        renderZebras();
        loadLeagueCrests(l.id);
      });
      pill.querySelector('[data-star]').addEventListener('click', e => {
        e.stopPropagation();
        const wasFaved = l.faved;
        l.faved = !l.faved;
        toggleFavLeague(l.id, l.name);
        renderLeagueBar();
        if (!wasFaved) loadLeagueLogo(l.id).then(() => renderLeagueBar());
      });
      bar.appendChild(pill);

      // Carrega logo SDB se ainda não tem
      if (!cached) {
        loadLeagueLogo(l.id).then(badge => {
          if (badge) {
            const labelEl = bar.querySelector(`[data-lid="${l.id}"]`);
            if (labelEl) {
              labelEl.innerHTML = `<img src="${badge}" style="width:14px;height:14px;object-fit:contain;flex-shrink:0;" onerror="this.remove();">${shortName}`;
            }
          }
        });
      }
    });
  }

  // ── ZEBRA LIST ───────────────────────────────────────────────
  function renderZebras() {
    const container = document.getElementById('zebraList');
    container.innerHTML = '';
    const isPro = getUserPlan() !== 'free';

    let list = [...ZEBRAS];
    if (activeLeague !== 'all') list = list.filter(z => z.lid === activeLeague);
    if (activeFilter !== 'all') list = list.filter(z => ziClass(z) === activeFilter);

    document.getElementById('zebraCount').textContent = `${list.length} resultado${list.length !== 1 ? 's' : ''}`;

    if (!list.length) {
      container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gray);">
        <div style="font-size:2rem;margin-bottom:8px;">🦓</div>
        <div style="font-weight:600;margin-bottom:4px;">Nenhuma zebra encontrada</div>
        <div style="font-size:0.8125rem;">Tente outro filtro ou liga</div>
      </div>`;
      return;
    }

    function zbCrest(url, name) {
      const abbr = name.substring(0,3).toUpperCase();
      const inner = url
        ? `<img src="${url}" alt="${name}" style="width:36px;height:36px;object-fit:contain;" loading="lazy" onerror="this.style.display='none';">`
        : `<span style="font-size:0.5625rem;font-weight:700;color:var(--gray);">${abbr}</span>`;
      return `<div style="width:40px;height:40px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">${inner}</div>`;
    }

    list.forEach((z, i) => {
      const cls   = ziClass(z);
      const label = ziLabel(cls);
      const locked = i >= 4 && !isPro;

      const card = document.createElement('div');
      card.className = 'zebra-card';

      const leagueBadge = LEAGUE_LOGOS[z.lid] || '';
      const leagueLogoHtml = leagueBadge
        ? `<img src="${leagueBadge}" style="width:12px;height:12px;object-fit:contain;vertical-align:middle;margin-right:3px;" onerror="this.remove();">`
        : '';

      const hcUrl = getCrest(z.home);
      const acUrl = getCrest(z.away);

      // Barra de probabilidade (proporção de odds)
      const hOdd = parseFloat(z.odds_h) || 4.5;
      const aOdd = parseFloat(z.odds_a) || 1.7;
      const probH = Math.round((1/hOdd) * 100);
      const probA = Math.round((1/aOdd) * 100);
      const probE = Math.max(0, 100 - probH - probA);

      if (locked) {
        card.style.cssText = 'position:relative;overflow:hidden;';
        card.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <span class="text-xs text-gray">${leagueLogoHtml}${z.league} · ${z.date}</span>
            <span class="zebra-index-badge zi--${cls}">🦓 ${z.zi} ${label}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;filter:blur(4px);pointer-events:none;user-select:none;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(hcUrl, z.home)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.home}</span>
            </div>
            <div style="text-align:center;">
              <div style="font-size:1.625rem;font-weight:800;letter-spacing:-1px;">${z.hs} – ${z.as}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(acUrl, z.away)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.away}</span>
            </div>
          </div>
          <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,var(--card) 70%);display:flex;align-items:flex-end;justify-content:center;padding:14px;">
            <a href="assinatura.html" style="font-size:0.8125rem;color:var(--green);font-weight:700;text-decoration:none;background:var(--green-dim);border:1px solid rgba(46,230,92,0.3);padding:8px 20px;border-radius:var(--radius-pill);">🔒 Ver com Pro</a>
          </div>`;
      } else {
        card.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <span class="text-xs text-gray">${leagueLogoHtml}${z.league} · ${z.date}</span>
            <span class="zebra-index-badge zi--${cls}">🦓 ${z.zi} ${label}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:12px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(hcUrl, z.home)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.home}</span>
              <span style="font-size:0.625rem;color:var(--green);font-weight:700;">Azarão</span>
            </div>
            <div style="text-align:center;">
              <div style="font-size:1.75rem;font-weight:800;letter-spacing:-1px;">${z.hs} – ${z.as}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
              ${zbCrest(acUrl, z.away)}
              <span style="font-size:0.8125rem;font-weight:600;text-align:center;">${z.away}</span>
              <span style="font-size:0.625rem;color:var(--gray);">Favorito</span>
            </div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:0.625rem;color:var(--gray);margin-bottom:4px;">
              <span>${z.home} ${probH}%</span>
              <span>Empate ${probE}%</span>
              <span>${z.away} ${probA}%</span>
            </div>
            <div style="display:flex;gap:2px;height:5px;border-radius:3px;overflow:hidden;">
              <div style="flex:${probH};background:var(--green);"></div>
              <div style="flex:${probE};background:var(--border);"></div>
              <div style="flex:${probA};background:var(--red);"></div>
            </div>
          </div>
          <div style="display:flex;gap:12px;padding-top:10px;border-top:1px solid var(--border);align-items:center;">
            <div>
              <div style="font-size:0.625rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Odd azarão</div>
              <div style="font-size:0.9375rem;font-weight:700;color:var(--green);">${z.odds_h}</div>
            </div>
            <div>
              <div style="font-size:0.625rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Odd favorito</div>
              <div style="font-size:0.9375rem;font-weight:700;color:var(--red);">${z.odds_a}</div>
            </div>
            <a href="partida.html" style="margin-left:auto;font-size:0.75rem;color:var(--green);font-weight:600;text-decoration:none;display:flex;align-items:center;gap:3px;">Ver detalhes <i data-lucide="arrow-right" style="width:13px;height:13px;"></i></a>
          </div>`;
      }

      card.addEventListener('click', e => { if (e.target.tagName !== 'A') window.location.href = 'partida.html'; });
      container.appendChild(card);
    });
    // Re-render lucide icons for arrow-right inside cards
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  // ── FILTROS ──────────────────────────────────────────────────
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      activeFilter = this.dataset.filter;
      renderZebras();
    });
  });

  // ── MODAL ────────────────────────────────────────────────────
  const modal = document.getElementById('addLeagueModal');

  document.getElementById('addLeagueBtn').addEventListener('click', () => {
    modal.classList.add('show');
    renderModalLeagues('');
    document.getElementById('leagueSearchInput').focus();
  });
  document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('show'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });
  document.getElementById('leagueSearchInput').addEventListener('input', e => renderModalLeagues(e.target.value));

  function renderModalLeagues(query) {
    const container = document.getElementById('allLeaguesList');
    container.innerHTML = '';
    const filtered = LEAGUES.filter(l =>
      l.name.toLowerCase().includes(query.toLowerCase()) ||
      l.country.toLowerCase().includes(query.toLowerCase())
    );
    if (!filtered.length) {
      container.innerHTML = `<p style="text-align:center;padding:20px;color:var(--gray);font-size:0.875rem;">Nenhuma liga encontrada</p>`;
      return;
    }
    filtered.forEach(l => {
      const item = document.createElement('div');
      item.className = `league-list-item${l.faved ? ' added' : ''}`;
      item.innerHTML = `
        <span class="league-list-item__flag">${l.flag}</span>
        <div style="flex:1;">
          <div class="league-list-item__name">${l.name}</div>
          <div style="font-size:0.75rem;color:var(--gray);">${l.country}</div>
        </div>
        <span class="league-list-item__action">${l.faved ? '✓ Adicionada' : '+ Adicionar'}</span>
      `;
      item.addEventListener('click', () => {
        l.faved = !l.faved;
        renderModalLeagues(query);
        renderLeagueBar();
        showToast(l.faved ? `⭐ ${l.name} adicionada` : `${l.name} removida`);
      });
      container.appendChild(item);
    });
  }

  // ── INIT ─────────────────────────────────────────────────────
  updatePlanBadge();
  renderLeagueBar();
  renderZebras();

  // Pré-carrega logos de ligas e escudos das ligas padrão
  (async () => {
    const favLids = LEAGUES.filter(l => l.faved).map(l => l.id);
    await Promise.all(favLids.map(lid => loadLeagueLogo(lid)));
    renderLeagueBar(); // re-renderiza com logos
    lucide.createIcons();
    await Promise.all(favLids.map(lid => loadLeagueCrests(lid)));
    renderZebras(); // re-renderiza com escudos
  })();

  // ── INTEGRAÇÃO COM APIS ──────────────────────────────────────
  async function initRealData() {
    if (typeof ZebraAPI === 'undefined') return;
    if (!ZebraAPI.isConfigured.footballData()) return;

    const lid = activeLeague === 'all' ? 'ENG' : activeLeague;
    const NAMES = { ENG:'Prem. League', ESP:'La Liga', ITA:'Serie A', GER:'Bundesliga', BRA:'Brasileirão', FRA:'Ligue 1' };

    try {
      const [matchData, standData] = await Promise.all([
        ZebraAPI.footballData.getMatches(lid, 'FINISHED', 20),
        ZebraAPI.footballData.getStandings(lid),
      ]);
      if (!matchData?.matches?.length) return;

      // Mapa nome → posição na tabela
      const posMap = {};
      if (standData) {
        ZebraAPI.transform.fdStandings(standData).forEach(r => {
          posMap[r.name] = r.pos;
          if (r.abbr) posMap[r.abbr] = r.pos;
        });
      }

      const realZebras = [];
      matchData.matches.forEach(m => {
        const t = ZebraAPI.transform.fdMatch(m);
        if (!t.isFinished || t.winner === 'DRAW' || !t.winner) return;
        const isHomeWin = t.winner === 'HOME_TEAM';
        const winName   = isHomeWin ? t.homeFull : t.awayFull;
        const loseName  = isHomeWin ? t.awayFull : t.homeFull;
        const winPos    = posMap[winName]  || posMap[t.home];
        const losePos   = posMap[loseName] || posMap[t.away];
        const zi        = (winPos && losePos) ? ZebraAPI.zebra.fromPositions(winPos, losePos) : 0;
        if (zi > 0) {
          realZebras.push({ home:t.home, away:t.away, hs:t.hs, as:t.as, league:NAMES[lid]||lid, lid, date:t.date, zi, odds_h:'–', odds_a:'–' });
        }
      });

      realZebras.sort((a, b) => b.zi - a.zi);

      if (realZebras.length) {
        ZEBRAS.length = 0;
        ZEBRAS.push(...realZebras);
        renderZebras();
        document.getElementById('zebraCount').textContent = `${realZebras.length} resultado${realZebras.length !== 1 ? 's' : ''} · dados reais ⚡`;
      }
    } catch(e) { console.warn('[Zebras] Erro ao carregar dados reais:', e.message); }
  }

  initRealData();
  lucide.createIcons();
</script>
<style>
  .bottom-nav__icon i { width: 20px; height: 20px; display: block; }
  .navbar__icon i { display: block; }
</style>
</body>
