// ── LEAGUES ───────────────────────────────────────────────────────────────────
const LEAGUES = [
  { id:'BRA', name:'Brasileirão',       country:'Brasil',  flag:'br' },
  { id:'ENG', name:'Premier League',    country:'Europa',  flag:'gb-eng' },
  { id:'ESP', name:'La Liga',           country:'Europa',  flag:'es' },
  { id:'ITA', name:'Serie A',           country:'Europa',  flag:'it' },
  { id:'GER', name:'Bundesliga',        country:'Europa',  flag:'de' },
  { id:'FRA', name:'Ligue 1',           country:'Europa',  flag:'fr' },
  { id:'POR', name:'Liga Portugal',     country:'Europa',  flag:'pt' },
  { id:'UCL', name:'Champions League',  country:'Europa',  flag:'eu' },
];

let activeFilter = 'todos';
let searchQuery  = '';

// ── EUROPEAN LEAGUE IDS for team filtering ─────────────────────────────────
const EUROPEAN_LEAGUES = ['Premier League', 'La Liga', 'Serie A', 'Bundesliga', 'Ligue 1', 'Liga Portugal', 'Champions League', 'Inglaterra', 'Espanha', 'Itália', 'Alemanha', 'França', 'Portugal'];

function isEuropeanTeam(league) {
  if (!league) return false;
  const l = league.toLowerCase();
  return l.includes('premier') || l.includes('liga') || l.includes('bundesliga') ||
         l.includes('ligue') || l.includes('serie a') || l.includes('champions') ||
         l.includes('inglaterra') || l.includes('espanha') || l.includes('itália') ||
         l.includes('alemanha') || l.includes('frança') || l.includes('portugal') ||
         l.includes('italy') || l.includes('spain') || l.includes('germany') ||
         l.includes('france') || l.includes('england');
}

function isBrasilTeam(league) { // FIX 27 — added 'brasilei' to catch all Brasileirão variants
  if (!league) return false;
  const l = league.toLowerCase();
  return l.includes('brasil') || l.includes('brasilei') || l.includes('brasileiro') || l.includes('série a') || l.includes('serie a · brasil');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderExplorar() {
  const container = document.getElementById('explorarResults');
  const q = searchQuery.toLowerCase();

  // Filter teams
  let filteredTeams = Object.entries(TEAMS).filter(([id, t]) => {
    const matchesSearch = !q || t.name.toLowerCase().includes(q);
    if (!matchesSearch) return false;
    if (activeFilter === 'times' || activeFilter === 'todos') return true;
    if (activeFilter === 'brasil') return isBrasilTeam(t.league);
    if (activeFilter === 'europa') return isEuropeanTeam(t.league);
    if (activeFilter === 'ligas') return false;
    return true;
  });

  // Filter leagues
  let filteredLeagues = LEAGUES.filter(l => {
    const matchesSearch = !q || l.name.toLowerCase().includes(q) || l.country.toLowerCase().includes(q);
    if (!matchesSearch) return false;
    if (activeFilter === 'ligas' || activeFilter === 'todos') return true;
    if (activeFilter === 'brasil') return l.country === 'Brasil';
    if (activeFilter === 'europa') return l.country === 'Europa';
    if (activeFilter === 'times') return false;
    return true;
  });

  // No results
  if (filteredTeams.length === 0 && filteredLeagues.length === 0) {
    const label = q ? `"${searchQuery}"` : activeFilter;
    container.innerHTML = `
      <div style="text-align:center;padding:48px 20px;color:var(--gray);">
        <div style="font-size:2.5rem;margin-bottom:12px;">🔍</div>
        <div style="font-weight:600;margin-bottom:6px;">Nenhum resultado encontrado para ${label}</div>
        <div style="font-size:0.8125rem;line-height:1.5;">Tente outro termo ou filtro.</div>
      </div>`;
    lucide.createIcons();
    return;
  }

  let html = '';

  // Teams section
  if (filteredTeams.length > 0) {
    html += `
      <div class="section-header">
        <span class="section-title"><i data-lucide="shield" class="sec-ic"></i>Times</span>
        <span style="font-size:0.6875rem;color:var(--gray);">${filteredTeams.length} encontrados</span>
      </div>
      <div class="teams-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">`;

    filteredTeams.forEach(([id, t]) => {
      const faved = isFavorite ? isFavorite(id) : false;
      const heartIcon = faved
        ? `<i data-lucide="heart" style="width:14px;height:14px;fill:var(--red);color:var(--red);"></i>`
        : `<i data-lucide="heart" style="width:14px;height:14px;color:var(--gray);"></i>`;
      const ziCls = t.zi >= 7 ? 'grande' : t.zi >= 4 ? 'media' : 'leve';
      const ziColor = t.zi >= 7 ? 'var(--red)' : t.zi >= 4 ? 'var(--gold)' : 'var(--gray)';
      html += `
        <div class="expl-team-card" data-id="${id}" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;cursor:pointer;position:relative;">
          <button class="expl-fav-btn" data-id="${id}" data-name="${t.name}" style="position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background 0.15s;">${heartIcon}</button>
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;padding-right:28px;">
            <div style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0;"></div>
            <div style="font-weight:600;font-size:0.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.name}</div>
          </div>
          <div style="font-size:0.75rem;color:var(--gray);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.league}</div>
          <div style="font-size:0.6875rem;color:${ziColor};font-weight:700;">🦓 ZI ${t.zi.toFixed(1)}</div>
        </div>`;
    });

    html += `</div>`;
  }

  // Leagues section
  if (filteredLeagues.length > 0) {
    html += `
      <div class="section-header">
        <span class="section-title"><i data-lucide="trophy" class="sec-ic"></i>Ligas</span>
        <span style="font-size:0.6875rem;color:var(--gray);">${filteredLeagues.length} encontradas</span>
      </div>`;

    filteredLeagues.forEach(l => {
      const faved = isFavLeague ? isFavLeague(l.id) : false;
      const starIcon = faved
        ? `<i data-lucide="star" style="width:16px;height:16px;fill:var(--gold);color:var(--gold);"></i>`
        : `<i data-lucide="star" style="width:16px;height:16px;color:var(--gray);"></i>`;
      const countryPill = `<span style="font-size:0.625rem;background:var(--card2);color:var(--gray);padding:2px 7px;border-radius:var(--radius-pill);border:1px solid var(--border);font-weight:500;">${l.country}</span>`;
      html += `
        <div class="expl-league-card" data-id="${l.id}" style="display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:8px;cursor:pointer;">
          <img src="https://flagcdn.com/w20/${l.flag}.png" style="width:20px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0;" alt="${l.country}" />
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:0.9375rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.name}</div>
          </div>
          ${countryPill}
          <button class="expl-star-btn" data-id="${l.id}" data-name="${l.name}" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background 0.15s;flex-shrink:0;">${starIcon}</button>
        </div>`;
    });
  }

  container.innerHTML = html;

  // Team card clicks
  container.querySelectorAll('.expl-team-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.closest('.expl-fav-btn')) return;
      window.location.href = 'time.html?team=' + this.dataset.id;
    });
  });

  // Team fav buttons
  container.querySelectorAll('.expl-fav-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFavorite(this.dataset.id, this.dataset.name);
      animFavBtn && animFavBtn(this);
      renderExplorar();
    });
  });

  // League card clicks
  container.querySelectorAll('.expl-league-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.closest('.expl-star-btn')) return;
      window.location.href = 'liga.html?id=' + this.dataset.id;
    });
  });

  // League star buttons
  container.querySelectorAll('.expl-star-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFavLeague(this.dataset.id, this.dataset.name);
      animFavBtn && animFavBtn(this);
      renderExplorar();
    });
  });

  lucide.createIcons();
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  renderExplorar();
});

document.querySelectorAll('#filterChips .filter-chip').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#filterChips .filter-chip').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.filter;
    renderExplorar();
  });
});

// ── SEARCH HISTORY ────────────────────────────────────────────────────────────
const SEARCH_HISTORY_KEY = 'zs_search_history';

function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]'); } catch { return []; }
}

function addToSearchHistory(term) {
  if (!term || term.length < 2) return;
  const history = getSearchHistory().filter(h => h !== term).slice(0, 7);
  history.unshift(term);
  try { localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history)); } catch {}
}

function renderSearchHistory() {
  const history = getSearchHistory();
  const container = document.getElementById('searchHistoryList');
  const wrapper   = document.getElementById('searchHistory');
  if (!container || !wrapper) return;
  if (!history.length) { wrapper.style.display = 'none'; return; }
  wrapper.style.display = 'block';
  container.innerHTML = history.map(term => `
    <button onclick="document.getElementById('searchInput').value='${term.replace(/'/g,"\\'")}';searchQuery='${term.replace(/'/g,"\\'")}';renderExplorar();document.getElementById('searchHistory').style.display='none';"
      style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-pill);padding:4px 10px;font-size:0.75rem;color:var(--gray);cursor:pointer;display:inline-flex;align-items:center;gap:4px;">
      <i data-lucide="clock" style="width:11px;height:11px;"></i>${term}
    </button>`).join('');
  lucide.createIcons();
}

(function initSearchHistory() {
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('focus', () => { renderSearchHistory(); });
    searchInput.addEventListener('blur', () => {
      setTimeout(() => { const h = document.getElementById('searchHistory'); if (h) h.style.display='none'; }, 200);
      if (searchQuery.length > 1) addToSearchHistory(searchQuery);
    });
  }
  renderSearchHistory();
})();

updatePlanBadge && updatePlanBadge();
